name: Keep Morning Dew backend awake

# Render's free tier spins the service down after ~15 minutes idle, so the first
# request after a quiet period waits 10-30s while it wakes. This workflow pings
# the backend every ~10 minutes, around the clock, so the app is instant whenever
# it's opened — including first thing in the morning. (The repo is public, so
# GitHub Actions minutes are free and unlimited.)
#
# NOTE: GitHub only runs scheduled workflows from the repository's DEFAULT branch
# (main), which is why this file lives on main. GitHub's scheduler is best-effort
# and can run a few minutes late under load; that's fine for a ~15-minute idle
# window. If a run shows a non-200, the backend was simply mid-wake and the next
# tick (or the request itself) brings it up.
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes, 24/7 — keep the backend warm
    - cron: '0 21 * * *'     # 07:00 Brisbane (UTC+10) — send the morning brief push
  workflow_dispatch:

permissions: {}

concurrency:
  group: morning-dew-ping
  cancel-in-progress: false

jobs:
  ping:
    if: github.event.schedule != '0 21 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend until awake
        run: |
          URL="https://morning-dew-backend-3w0m.onrender.com/"
          for i in 1 2 3 4; do
            code=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 70 "$URL" || echo "000")
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is awake."
              exit 0
            fi
            sleep 20
          done
          # Don't fail the job (avoids noisy failure emails) — the request itself
          # has already triggered the wake; the next scheduled tick will confirm.
          echo "Backend not confirmed 200 yet; it is likely still waking."

  # Fires only on the 07:00-Brisbane schedule (or a manual run): asks the backend
  # to push the morning brief to subscribed devices. Guarded by CRON_SECRET.
  morning-push:
    if: github.event.schedule == '0 21 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send morning brief push
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST --max-time 90 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://morning-dew-backend-3w0m.onrender.com/api/cron/morning-push" || echo "000")
          echo "morning-push HTTP $code"
