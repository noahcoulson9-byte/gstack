<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Morning Dew</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0A0C10" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Morning Dew" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<style>
  :root {
    --text: #f5f7fb;
    --muted: rgba(245, 247, 251, 0.56);
    --glass-bg: rgba(255, 255, 255, 0.045);
    --glass-bg-soft: rgba(255, 255, 255, 0.07);
    --glass-border: rgba(255, 255, 255, 0.10);
    --glass-highlight: rgba(255, 255, 255, 0.14);
    --accent: #ffb22e;
    --home-accent: #5599ff;
    --bar-pink: #FF4D8D;
    --bar-orange: #FF9F43;
    --bar-blue: #3D7BFF;
    --danger: #ff6b6b;
    --ok: #34e0c4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overflow-x: hidden;
  }
  body {
    position: relative;
    background: linear-gradient(168deg, #0c1020 0%, #0a0b12 55%, #0a080f 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(env(safe-area-inset-top) + 0.3rem) 1.1rem 0;
    gap: 0;
  }
  main.home { width: 100%; max-width: 460px; }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(64px);
    opacity: 0.5;
    z-index: 0;
    will-change: transform;
  }
  .blob-a {
    width: 72vw; height: 72vw;
    top: -20vw; left: -18vw;
    background: radial-gradient(circle, #4d7fff, transparent 70%);
    opacity: 0.52;
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .blob-b {
    width: 75vw; height: 75vw;
    bottom: -30vw; right: -28vw;
    background: radial-gradient(circle, #b830e0, transparent 70%);
    opacity: 0.42;
    animation: drift2 26s ease-in-out infinite alternate;
  }
  .blob-c {
    width: 55vw; height: 55vw;
    top: 30vh; right: -20vw;
    background: radial-gradient(circle, #ff7040, transparent 70%);
    opacity: 0.32;
    animation: drift3 30s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(6vw, 8vh); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-8vw, -6vh); } }
  @keyframes drift3 { from { transform: translate(0,0); } to { transform: translate(-5vw, 5vh); } }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .greeting-block { padding: 0 0.25rem; }
  .greeting-date {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .greeting-phrase {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .greeting-name {
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.01em;
    background: linear-gradient(120deg, #ffffff, #cfe0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .updated-label {
    color: var(--muted); font-size: 0.74rem; font-weight: 600;
    margin-top: 0.45rem; opacity: 0.75;
  }

  .glass {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 26px;
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    overflow: hidden;
  }
  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glass-highlight), transparent 45%);
    opacity: 0.22;
    pointer-events: none;
  }

  /* ---- Card colour variants (locally re-scope text vars so children adapt) ---- */
  .card-cream {
    background: #efe5d4;
    --text: #33241a; --muted: rgba(51,36,26,0.62); --glass-border: rgba(0,0,0,0.08);
    color: var(--text);
  }
  .card-amber {
    background: linear-gradient(150deg, #ffc24d 0%, #f5a623 100%);
    --text: #3a2710; --muted: rgba(58,39,16,0.66); --glass-border: rgba(0,0,0,0.10);
    color: var(--text);
  }
  .card-tan {
    background: #d9bfa6;
    --text: #3a2a1c; --muted: rgba(58,42,28,0.62); --glass-border: rgba(0,0,0,0.08);
    color: var(--text);
  }
  .card-dark { background: rgba(28,20,14,0.62); }
  .card-cream::before, .card-amber::before, .card-tan::before { opacity: 0; }

  /* ---- Welcome header ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 0.25rem; }
  .brand { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.01em; color: var(--accent); }
  .brand small { display: block; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-top: -0.1rem; }
  .welcome { padding: 0 0.25rem; }
  .welcome-hi { font-size: 1.15rem; font-weight: 600; color: var(--muted); }
  .welcome-name {
    margin: 0.1rem 0 0; font-size: 2.7rem; font-weight: 800; line-height: 1.02; letter-spacing: -0.02em;
    background: linear-gradient(110deg, #fff5e6, var(--accent)); -webkit-background-clip: text;
    background-clip: text; color: transparent;
  }
  .welcome-date { color: var(--muted); font-size: 0.86rem; font-weight: 600; margin-top: 0.5rem; }

  /* ---- Bento grid ---- */
  .bento {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 0.7rem; align-items: start;
  }
  .bento > * { min-width: 0; }
  .span2 { grid-column: span 2; }
  .bento-card { padding: 1rem 1.05rem; }
  .bento-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 0.6rem; letter-spacing: -0.01em; }
  .bento-head { display: flex; align-items: center; gap: 0.5rem; }
  .bento-head .bento-title { margin-bottom: 0; margin-right: auto; }

  /* Stat tiles */
  .stat-tile { padding: 0.8rem 0.9rem; }

  /* ---- Single-screen launcher home ---- */
  main.home {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; gap: 0.85rem;
  }
  .home-tiles {
    min-height: 46vh;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0.7rem;
  }
  .home-tile {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between;
    gap: 0.15rem; padding: 1rem; min-height: 0; overflow: hidden;
    text-align: left; cursor: pointer;
    transition: transform 0.12s ease;
  }
  .home-tile:active { transform: scale(0.97); }

  /* ---- Readiness (Apple Watch / Bevel) ---- */
  .health-card { padding: 1rem 1.1rem 1.1rem; text-align: left; cursor: pointer; transition: transform 0.12s ease; }
  .health-card:active { transform: scale(0.99); }
  .health-card-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.7rem; }
  .health-card-title { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.01em; }
  .health-card-meta { font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-left: auto; }
  .health-rings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
  .hring { display: flex; flex-direction: column; align-items: center; gap: 0.45rem; }
  .hring-wrap { position: relative; width: 5.4rem; height: 5.4rem; }
  .hring-wrap svg { width: 100%; height: 100%; display: block; }
  .hring-val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
  .hring-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); }
  .rtrack { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 16; }
  .health-empty { color: var(--muted); font-size: 0.86rem; line-height: 1.4; padding: 0.3rem 0.1rem; }
  .health-empty b { color: var(--text); font-weight: 700; }
  /* Detail-section rings (larger) */
  .health-detail-rings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin: 0.4rem 0 1.2rem; }
  .health-detail-rings .hring-wrap { width: 6.6rem; height: 6.6rem; }
  .health-detail-rings .hring-val { font-size: 1.55rem; }
  .health-foot-note { color: var(--muted); font-size: 0.82rem; line-height: 1.45; }
  /* Redesigned health detail page */
  .hd-hero { text-align: center; padding: 1.6rem 1rem 1.4rem; }
  .hd-hero-score { font-size: 4.5rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
  .hd-hero-word { font-size: 1.05rem; font-weight: 700; margin-top: 0.3rem; }
  .hd-hero-trend { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
  .hd-dual { display: flex; gap: 0.65rem; }
  .hd-dual-card { flex: 1; padding: 1rem 0.9rem; text-align: center; }
  .hd-dual-val { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .hd-dual-lbl { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-top: 0.25rem; }
  .hd-dual-word { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
  .hd-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .hd-chip { flex: 1; min-width: 4.5rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 14px; padding: 0.6rem 0.65rem; }
  .hd-chip-val { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.01em; }
  .hd-chip-lbl { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-top: 0.12rem; }
  .hd-target-row { display: flex; justify-content: space-between; align-items: center; }
  .hd-target-band { font-size: 1.2rem; font-weight: 800; color: var(--bar-orange); }
  .hd-chart-hdr { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.6rem; }

  /* Oura-style Health full-screen page */
  .health-page {
    position: fixed; inset: 0; z-index: 60;
    background: linear-gradient(168deg, #0e2018 0%, #0a1510 55%, #07100d 100%);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column;
    animation: debriefIn 0.32s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .health-page[hidden] { display: none; }
  .health-page.closing { animation: debriefOut 0.22s ease forwards; }
  .hp-back-row { display: flex; align-items: center; gap: 0.8rem; padding: calc(env(safe-area-inset-top) + 0.8rem) 1.1rem 0; flex-shrink: 0; }
  .hp-stat-bar { display: flex; justify-content: space-around; padding: 0.9rem 1rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .hp-stat { text-align: center; }
  .hp-stat-val { font-size: 1.35rem; font-weight: 700; }
  .hp-stat-lbl { font-size: 0.59rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); margin-top: 0.12rem; }
  .hp-hero { text-align: center; padding: 2rem 1.5rem 1.25rem; position: relative; }
  .hp-hero-glow { position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%); width: 220px; height: 220px; border-radius: 50%; pointer-events: none; }
  .hp-hero-num { font-size: 5.5rem; font-weight: 200; letter-spacing: -0.04em; line-height: 1; position: relative; }
  .hp-hero-cat { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 0.5rem; }
  .hp-hero-headline { font-size: 1.75rem; font-weight: 700; margin-top: 0.4rem; }
  .hp-hero-trend { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-top: 0.55rem; }
  .hp-metrics { padding: 0 1rem 0.5rem; display: flex; flex-direction: column; gap: 0.55rem; }
  .hp-metric-row { display: flex; align-items: center; gap: 0.85rem; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 0.85rem 1rem; border: 1px solid rgba(255,255,255,0.06); }
  .hp-metric-icon { width: 2.1rem; height: 2.1rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  .hp-metric-body { flex: 1; min-width: 0; }
  .hp-metric-name { font-size: 0.9rem; font-weight: 600; }
  .hp-status-pill { display: inline-block; font-size: 0.58rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; padding: 0.15rem 0.5rem; border-radius: 20px; margin-top: 0.22rem; }
  .hp-pill-green { background: rgba(52,201,138,0.18); color: #5fd39b; }
  .hp-pill-orange { background: rgba(255,159,67,0.18); color: #ffb347; }
  .hp-pill-red { background: rgba(255,107,107,0.18); color: #ff8080; }
  .hp-pill-blue { background: rgba(100,150,255,0.18); color: #7fa8ff; }
  .hp-metric-right { text-align: right; flex-shrink: 0; }
  .hp-metric-val { font-size: 1.55rem; font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
  .hp-metric-unit { font-size: 0.72rem; color: rgba(255,255,255,0.45); margin-top: 0.1rem; }
  .hp-metric-bar { width: 4rem; height: 3px; background: rgba(255,255,255,0.12); border-radius: 3px; margin-top: 0.35rem; margin-left: auto; overflow: hidden; }
  .hp-metric-bar-fill { height: 100%; border-radius: 3px; }
  .hp-metric-chev { color: rgba(255,255,255,0.2); margin-left: 0.3rem; font-size: 1rem; flex-shrink: 0; }
  .hp-chart { padding: 0 1rem 0.5rem; }
  .hp-chart-hdr { font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: rgba(255,255,255,0.4); margin-bottom: 0.65rem; }
  .hp-footer { padding: 0.75rem 1rem calc(env(safe-area-inset-bottom) + 5rem); }
  .hp-update-btn { width: 100%; padding: 0.8rem; border-radius: 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.65); font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  .hp-update-btn:active { background: rgba(255,255,255,0.13); }

  /* Oura-style top tab row */
  .hp-tab-row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }
  .hp-tab { flex: 1; padding: 0.7rem 0.25rem 0.55rem; text-align: center; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; color: rgba(255,255,255,0.38); transition: color 0.15s, border-color 0.15s; font-family: inherit; }
  .hp-tab.active { color: #fff; border-bottom-color: #34c98a; }
  .hp-tab-val { display: block; font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
  .hp-tab-lbl { display: block; font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 0.1rem; }
  .hp-tab-panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .hp-tab-panel[hidden] { display: none; }

  /* Mountain scenic hero (Tab 0) */
  .hp-mountain-wrap { position: relative; height: 340px; overflow: hidden; flex-shrink: 0; }
  .hp-mountain-sky { position: absolute; inset: 0; background: linear-gradient(175deg, #0b3d2e 0%, #082a1e 45%, #04150e 100%); }
  .hp-mountain-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 1.5rem 2.5rem; }
  .hp-big-score { font-size: 5.5rem; font-weight: 200; letter-spacing: -0.04em; line-height: 1; }
  .hp-score-cat { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-top: 0.45rem; }
  .hp-motivation { font-size: 1.7rem; font-weight: 700; margin-top: 0.35rem; }
  .hp-hero-desc { font-size: 0.85rem; line-height: 1.55; color: rgba(255,255,255,0.6); margin-top: 0.65rem; text-align: center; max-width: 290px; }
  .hp-learn-btn { margin-top: 1rem; padding: 0.52rem 1.6rem; border-radius: 20px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22); color: #fff; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  .hp-learn-btn:active { background: rgba(255,255,255,0.22); }
  .hp-secondary-row { display: flex; align-items: center; padding: 0.85rem 1.1rem; border-top: 1px solid rgba(255,255,255,0.08); gap: 0.6rem; }
  .hp-secondary-name { font-size: 0.88rem; font-weight: 600; }
  .hp-secondary-badge { margin-left: auto; font-size: 0.58rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.18rem 0.6rem; border-radius: 20px; }

  .tile-icon { font-size: 1.7rem; line-height: 1; }
  .tile-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .tile-value { font-size: 1.55rem; font-weight: 800; line-height: 1.05; letter-spacing: -0.01em; }
  .tile-sub { font-size: 0.78rem; color: var(--muted); max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Schedule pills (cream card) */
  .sched-item {
    display: flex; flex-direction: column; gap: 0.1rem;
    background: #2a1c12; color: #f3ead9;
    border-radius: 16px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem;
    text-decoration: none;
  }
  .sched-item:last-child { margin-bottom: 0; }
  .sched-item:nth-child(even) { background: #d9b08a; color: #33241a; }
  .sched-item:active { filter: brightness(1.08); }
  .sched-time { font-size: 0.72rem; font-weight: 700; opacity: 0.85; }
  .sched-title { font-size: 0.95rem; font-weight: 700; }

  /* Apple-Calendar-style day timeline (Schedule detail) */
  .day-tl-allday { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.6rem; }
  .day-tl-allday-chip { background: var(--home-accent); color: #fff; font-size: 0.78rem; font-weight: 700; padding: 0.3rem 0.6rem; border-radius: 10px; }
  .day-timeline { position: relative; margin-top: 0.4rem; }
  .day-tl-hour { position: absolute; left: 0; right: 0; height: 0; }
  .day-tl-hour-label { position: absolute; left: 0; top: -0.5em; width: 44px; font-size: 0.68rem; color: var(--muted); font-weight: 600; }
  .day-tl-hour-line { position: absolute; left: 52px; right: 0; top: 0; border-top: 1px solid var(--glass-border); }
  .day-tl-event {
    position: absolute; border-radius: 8px; padding: 0.25rem 0.45rem; overflow: hidden;
    background: linear-gradient(160deg, rgba(61,123,255,0.85), rgba(61,123,255,0.55));
    color: #fff; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex; flex-direction: column; gap: 0.05rem;
  }
  .day-tl-event:nth-of-type(3n+2) { background: linear-gradient(160deg, rgba(255,77,141,0.85), rgba(255,77,141,0.55)); }
  .day-tl-event:nth-of-type(3n) { background: linear-gradient(160deg, rgba(255,159,67,0.85), rgba(255,159,67,0.55)); }
  .day-tl-event-title { font-size: 0.76rem; font-weight: 700; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-tl-event-time { font-size: 0.66rem; opacity: 0.85; }
  .day-tl-now { position: absolute; left: 52px; right: 0; height: 0; border-top: 2px solid #ff453a; z-index: 2; }
  .day-tl-now-dot { position: absolute; left: -5px; top: -4px; width: 8px; height: 8px; border-radius: 50%; background: #ff453a; }

  /* Task checklist (cream card) */
  .task-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; }
  .task-box {
    flex-shrink: 0; width: 18px; height: 18px; border-radius: 6px;
    border: 2px solid rgba(51,36,26,0.4);
  }
  .task-title { font-size: 0.95rem; font-weight: 600; }
  .task-title .task-time { color: var(--muted); font-weight: 600; font-size: 0.82rem; margin-left: 0.3rem; }

  .section-title {
    position: relative;
    z-index: 1;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding: 0 0.25rem;
    margin-top: 0.2rem;
  }
  .section-title-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.2rem;
  }
  .section-title-row .section-title { margin-top: 0; margin-right: auto; }
  .icon-link {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.7rem;
    height: 1.7rem;
    border-radius: 8px;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    font-size: 1rem;
    line-height: 1;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .icon-link:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.16); }

  /* ---- weather ---- */
  .weather-card { padding: 1.5rem 1.4rem; text-align: center; }
  .weather-icon { font-size: 3.6rem; line-height: 1; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35)); }
  .temp { font-size: 3.8rem; font-weight: 700; margin: 0.1rem 0; letter-spacing: -0.02em; }
  .desc { font-size: 1.05rem; font-weight: 600; }
  .location { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }
  .stats-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .stat-card { padding: 0.85rem 1rem; text-align: left; }
  .stat-label { color: var(--muted); font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .stat-value { font-size: 1.25rem; font-weight: 700; margin-top: 0.15rem; }

  /* ---- 7-day forecast ---- */
  .forecast-card { padding: 0.5rem 1.1rem; }
  .forecast-row {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .forecast-row:last-child { border-bottom: none; }
  .fc-day { width: 2.6rem; font-weight: 600; font-size: 0.92rem; }
  .fc-icon { width: 1.9rem; text-align: center; font-size: 1.3rem; }
  .fc-rain {
    width: 3.1rem; font-size: 0.8rem; font-weight: 600;
    color: #5fb0ff; text-align: right; white-space: nowrap;
  }
  .fc-rain.dry { color: var(--muted); opacity: 0.5; }
  .fc-temps { flex: 1; display: flex; align-items: center; gap: 0.5rem; }
  .fc-lo { color: var(--muted); font-size: 0.9rem; width: 1.9rem; text-align: right; }
  .fc-hi { font-weight: 700; font-size: 0.95rem; width: 1.9rem; }
  .fc-track {
    flex: 1; height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.12); overflow: hidden; position: relative;
  }
  .fc-fill {
    position: absolute; top: 0; height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #4aa3ff, #ff8a3a);
  }

  /* ---- generic list cards (calendar / reminders / email) ---- */
  .list-card { padding: 1rem 1.1rem; }
  .list-row {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    padding: 0.65rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .list-row:last-child { border-bottom: none; }
  .list-row-title { font-weight: 600; font-size: 0.95rem; }
  .list-row-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.15rem; }
  .empty-state, .error-state, .placeholder-state {
    position: relative; z-index: 1;
    color: var(--muted); font-size: 0.88rem; padding: 0.4rem 0.1rem; line-height: 1.4;
  }
  .error-state { color: var(--danger); }
  .placeholder-state code {
    background: rgba(255,255,255,0.10); padding: 0.1rem 0.35rem; border-radius: 6px; font-size: 0.78rem;
  }
  .loading-state {
    position: relative; z-index: 1;
    color: var(--muted); font-size: 0.88rem; padding: 0.4rem 0.1rem;
  }
  .tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; padding: 0.12rem 0.45rem; border-radius: 8px; margin-bottom: 0.3rem;
  }
  .tag-urgent { background: rgba(255, 107, 107, 0.18); color: var(--danger); }
  .tag-new { background: rgba(52, 224, 196, 0.18); color: var(--ok); }

  /* ---- Outlook-style email list ---- */
  .mail-card { padding: 0.4rem 0.6rem; }
  .mail-scroll {
    position: relative; z-index: 1;
    max-height: 320px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mail-row {
    display: flex; align-items: flex-start; gap: 0.7rem;
    padding: 0.7rem 0.45rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-decoration: none; color: var(--text);
    transition: background 0.12s ease;
  }
  .mail-row:last-child { border-bottom: none; }
  .mail-row:active { background: rgba(255,255,255,0.08); }
  .mail-avatar {
    flex-shrink: 0;
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem; font-weight: 700; color: #fff;
    margin-top: 0.1rem;
  }
  .mail-body { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .mail-top {
    display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem;
  }
  .mail-sender {
    font-weight: 700; font-size: 0.95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mail-date { flex-shrink: 0; color: var(--muted); font-size: 0.78rem; }
  .mail-subject {
    font-size: 0.9rem; margin-top: 0.05rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mail-snippet {
    color: var(--muted); font-size: 0.82rem; line-height: 1.3; margin-top: 0.1rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .mail-unread-dot {
    flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%;
    background: #3a8dff; margin: 0.5rem 0 0 -0.2rem;
  }

  button {
    font-family: inherit;
    border: none;
    background: none;
    cursor: pointer;
  }
  .refresh-btn {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 0.9rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    border-radius: 22px;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .refresh-btn:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.16); }

  @keyframes spin360 { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  /* Floating pill bottom nav, replaces the old top-right gear/refresh buttons */
  .nd-bottom-nav {
    position: fixed; z-index: 5;
    left: 50%; transform: translateX(-50%);
    bottom: 0;
    display: flex; align-items: center; justify-content: space-around;
    gap: 0.2rem;
    width: min(92vw, 360px);
    padding: 0.45rem 0.6rem calc(env(safe-area-inset-bottom) + 0.45rem);
    border-radius: 28px;
    background: rgba(16, 18, 26, 0.72);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  }
  .nd-nav-btn {
    width: 44px; height: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    color: var(--muted);
    transition: color 0.15s ease, background 0.15s ease;
  }
  .nd-nav-btn svg { width: 22px; height: 22px; }
  .nd-nav-btn.active { color: var(--home-accent); background: rgba(61, 123, 255, 0.14); }
  .nd-nav-btn:active { background: rgba(255, 255, 255, 0.1); }
  .nd-nav-fab {
    width: 56px; height: 56px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: linear-gradient(150deg, #5b9dff, #3D7BFF 60%, #2a5fd9);
    color: #fff;
    box-shadow: 0 6px 18px rgba(61, 123, 255, 0.45);
    transform: translateY(-12px);
    transition: filter 0.15s ease;
  }
  .nd-nav-fab svg { width: 24px; height: 24px; }
  .nd-nav-fab:active { filter: brightness(1.08); }
  .nd-nav-fab.spinning { animation: spin360 0.6s ease; }

  /* Pull-to-refresh spinner */
  .ptr-spinner {
    position: fixed; z-index: 4;
    top: calc(env(safe-area-inset-top) + 0.4rem);
    left: 50%;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; color: var(--text);
    border-radius: 50%;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    opacity: 0; transform: translate(-50%, -10px);
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .ptr-spinner.active { animation: spin360 0.8s linear infinite; }

  /* ---- Hourly strip ---- */
  .hourly-card { padding: 0.6rem 0.4rem; }
  .hourly-strip {
    position: relative; z-index: 1;
    display: flex; gap: 0.2rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .hourly-strip::-webkit-scrollbar { display: none; }
  .hour-cell {
    flex: 0 0 auto; width: 3.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
    padding: 0.4rem 0;
  }
  .hc-time { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
  .hc-icon { font-size: 1.25rem; }
  .hc-temp { font-size: 0.95rem; font-weight: 700; }
  .hc-rain { font-size: 0.68rem; color: #5fb0ff; font-weight: 600; min-height: 0.9rem; }

  /* ---- Weather card extras ---- */
  .weather-hilo { font-size: 0.95rem; font-weight: 600; margin-top: 0.35rem; }
  .weather-hilo .hi { color: var(--text); }
  .weather-hilo .lo { color: var(--muted); }
  .weather-sun { color: var(--muted); font-size: 0.82rem; margin-top: 0.25rem; }

  /* ---- Today timeline ---- */
  .timeline-row {
    position: relative; z-index: 1;
    display: flex; align-items: flex-start; gap: 0.65rem;
    padding: 0.6rem 0.1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-decoration: none; color: var(--text);
  }
  .timeline-row:last-child { border-bottom: none; }
  a.timeline-row:active { background: rgba(255,255,255,0.08); }
  .tl-icon { flex-shrink: 0; font-size: 1.1rem; width: 1.5rem; text-align: center; }
  .tl-body { flex: 1; min-width: 0; }
  .tl-title { font-weight: 600; font-size: 0.95rem; }
  .tl-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; }
  .tl-time { flex-shrink: 0; font-size: 0.82rem; font-weight: 600; color: var(--muted); white-space: nowrap; margin-top: 0.1rem; }

  /* ---- Time-of-day theming: subtle cool shifts on the same near-black base ---- */
  body.theme-dawn  { background: linear-gradient(168deg, #0e1528 0%, #0c0a18 60%, #07080B 100%); }
  body.theme-day   { background: linear-gradient(168deg, #0c1020 0%, #0a0b12 55%, #0a080f 100%); }
  body.theme-dusk  { background: linear-gradient(168deg, #160e22 0%, #100a14 60%, #07080B 100%); }
  body.theme-night { background: linear-gradient(168deg, #0a0e18 0%, #07090e 60%, #050608 100%); }
  body.theme-night .blob { opacity: 0.44; }

  /* ---- Drill-in affordance + detail screens ---- */
  .card-drill {
    position: absolute; top: 0.7rem; right: 0.7rem; z-index: 2;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem; color: var(--text);
    border-radius: 50%;
    background: rgba(0,0,0,0.16);
    border: 1px solid rgba(0,0,0,0.12);
  }
  .card-drill:active { background: rgba(0,0,0,0.28); }
  .header-drill {
    display: inline-flex; align-items: center; gap: 0.25rem;
    font-size: 0.74rem; font-weight: 700; color: var(--accent);
    background: rgba(255,178,46,0.18);
    border: 1px solid rgba(255,178,46,0.38);
    border-radius: 999px; padding: 0.2rem 0.6rem;
  }
  .header-drill:active { background: rgba(255,178,46,0.32); }

  .detail-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(6,9,18,0.86);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: calc(env(safe-area-inset-top) + 0.8rem) 1.1rem calc(env(safe-area-inset-bottom) + 2rem);
    display: flex; flex-direction: column; gap: 1rem;
    animation: detailIn 0.22s ease;
  }
  .detail-overlay[hidden] { display: none; }
  @keyframes detailIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .detail-header { display: flex; align-items: center; gap: 0.8rem; }
  .detail-back {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; color: var(--text);
    border-radius: 50%; background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
  }
  .detail-back:active { background: rgba(255,255,255,0.16); }
  .detail-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.01em; }

  /* ---- Full-screen debrief page: solid background (no blur-through to home),
     horizontal push transition — reads as a new page, not an overlay sheet. ---- */
  .debrief-page {
    position: fixed; inset: 0; z-index: 60;
    background: linear-gradient(168deg, #2a1d13 0%, #1c130c 55%, #130d08 100%);
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: calc(env(safe-area-inset-top) + 0.8rem) 1.1rem calc(env(safe-area-inset-bottom) + 2rem);
    display: flex; flex-direction: column; gap: 1rem;
    animation: debriefIn 0.32s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .debrief-page[hidden] { display: none; }
  .debrief-page.closing { animation: debriefOut 0.22s ease forwards; }
  @keyframes debriefIn { from { opacity: 0.5; transform: translateX(32px); } to { opacity: 1; transform: none; } }
  @keyframes debriefOut { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(32px); } }
  .debrief-refresh-btn { margin-left: auto; }

  .debrief-section { padding: 1rem 1.1rem; cursor: pointer; }
  .debrief-section-head { display: flex; align-items: center; gap: 0.6rem; }
  .debrief-section-title { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); flex: 1; }
  .debrief-section-chev { color: var(--muted); font-size: 1.1rem; transition: transform 0.2s ease; flex-shrink: 0; }
  .debrief-section.expanded .debrief-section-chev { transform: rotate(90deg); }
  .debrief-section-summary { font-size: 1.02rem; font-weight: 600; line-height: 1.45; margin-top: 0.45rem; }
  /* Grid-rows 0fr->1fr trick: animates height without measuring it in JS. */
  .debrief-section-detail {
    font-size: 0.92rem; color: var(--muted); line-height: 1.55;
    display: grid; grid-template-rows: 0fr; opacity: 0; margin-top: 0;
    transition: grid-template-rows 0.3s ease, opacity 0.25s ease, margin-top 0.3s ease;
  }
  .debrief-section-detail > div { overflow: hidden; min-height: 0; }
  .debrief-section-detail .brief-h3 { color: var(--accent); opacity: 0.85; }
  .debrief-section.expanded .debrief-section-detail { grid-template-rows: 1fr; opacity: 1; margin-top: 0.75rem; }
  .debrief-tomorrow .debrief-section-title { color: #7dd8ff; }

  .detail-hero { padding: 1.2rem 1.2rem; }
  .metric-big { font-size: 3rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .metric-sub { color: var(--muted); font-size: 0.92rem; margin-top: 0.35rem; }
  .metric-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.8rem; }
  .metric-chip {
    background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
    border-radius: 14px; padding: 0.5rem 0.7rem; flex: 1; min-width: 5.5rem;
  }
  .metric-chip .k { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
  .metric-chip .v { font-size: 1.15rem; font-weight: 700; margin-top: 0.15rem; }

  .insight-card { padding: 1rem 1.1rem; }
  .insight-head {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin-bottom: 0.6rem;
  }
  .insight-line {
    position: relative; z-index: 1;
    display: flex; gap: 0.55rem; align-items: flex-start;
    font-size: 0.95rem; line-height: 1.4; padding: 0.32rem 0;
  }
  .insight-line .ico { flex-shrink: 0; }

  /* Horizontal labelled bar chart (free-time blocks, top senders, etc.) */
  .bars { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 0.2rem; }
  .bar-row { display: grid; grid-template-columns: 4.5rem 1fr auto; align-items: center; gap: 0.5rem; }
  .bar-row .bl { font-size: 0.82rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { height: 8px; border-radius: 5px; background: rgba(255,255,255,0.10); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, #ff9d4d, #ffc24d); }
  .bar-row .bv { font-size: 0.82rem; font-weight: 700; white-space: nowrap; }

  /* ---- Brief / review CTA on the home hero card ---- */
  .brief-cta {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 0.7rem; width: 100%;
    background: transparent; border: none; padding: 0.15rem 0; text-align: left; color: var(--text);
  }
  .brief-emoji { font-size: 1.5rem; flex-shrink: 0; }
  .brief-text { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .brief-text b { font-size: 1rem; font-weight: 700; line-height: 1.25; }
  .brief-sub { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; }
  .brief-arrow { flex-shrink: 0; color: var(--accent); font-size: 1.2rem; font-weight: 700; }

  /* ---- Brief section (rendered markdown) ---- */
  .brief-card { line-height: 1.5; }
  .brief-h { font-size: 1.25rem; font-weight: 800; margin: 0 0 0.6rem; letter-spacing: -0.01em; }
  .brief-h3 { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); margin: 1.1rem 0 0.35rem; }
  .brief-h3:first-of-type { margin-top: 0.7rem; }
  .brief-p { margin: 0.5rem 0; font-size: 0.95rem; line-height: 1.5; }
  .brief-ul { margin: 0.4rem 0; padding-left: 1.1rem; }
  .brief-ul li { margin: 0.3rem 0; font-size: 0.95rem; }
  .brief-actions { text-align: center; padding: 0.2rem 0; }
  .push-status { text-align: center; color: var(--muted); font-size: 0.85rem; font-weight: 600; padding: 0.3rem 0; }
  .brief-refresh {
    font-size: 0.85rem; font-weight: 700; color: var(--accent);
    background: rgba(255,178,46,0.16); border: 1px solid rgba(255,178,46,0.36);
    border-radius: 999px; padding: 0.5rem 1.1rem;
  }
  .brief-refresh:active { background: rgba(255,178,46,0.3); }

  /* ---- Two-way task controls ---- */
  .task-add {
    display: block; width: 100%; text-align: left;
    font-size: 0.9rem; font-weight: 700; color: var(--accent);
    background: rgba(255,178,46,0.12); border: 1px dashed rgba(255,178,46,0.45);
    border-radius: 14px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem;
  }
  .task-add:active { background: rgba(255,178,46,0.24); }
  .task-input-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
  .task-text-input {
    flex: 1; min-width: 0; font-family: inherit; font-size: 0.95rem;
    color: var(--text); background: rgba(0,0,0,0.06);
    border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.6rem 0.7rem;
  }
  .task-text-input::placeholder { color: var(--muted); }
  .task-add-btn {
    flex-shrink: 0; font-size: 0.9rem; font-weight: 800; color: #3a2710;
    background: var(--accent); border-radius: 12px; padding: 0.6rem 1rem;
  }
  .task-add-btn:active { filter: brightness(0.95); }
  .app-task .task-box { cursor: pointer; transition: background 0.12s ease; }
  .task-box.checked { background: var(--ok); border-color: var(--ok); position: relative; }
  .task-box.checked::after { content: "✓"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 800; color: #06231d; }
  .task-done .task-title { text-decoration: line-through; opacity: 0.55; }
  .task-mini { margin-left: 0.2rem; width: 24px; height: 24px; flex-shrink: 0; border-radius: 8px; background: rgba(0,0,0,0.08); color: var(--muted); font-size: 0.95rem; font-weight: 700; }
  .task-done-head { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0.7rem 0 0.2rem; }
  .review-note {
    width: 100%; min-height: 64px; resize: vertical; box-sizing: border-box;
    border-radius: 14px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.10);
    color: var(--text); font-family: inherit; font-size: 0.92rem; padding: 0.6rem 0.7rem; margin-top: 0.2rem;
  }

  /* ---- Streak chip in header ---- */

<script>
const BRISBANE = { latitude: -27.4698, longitude: 153.0251 };
const FETCH_TIMEOUT_MS = 8000;

// Calendar/reminders/email need the Bun backend, which can't run on GitHub
// Pages — when this frontend is hosted there, the backend lives on a
// different origin (e.g. Render), so /api/* calls need an absolute URL
// instead of a same-origin relative one. Persisted in localStorage so it
// survives reloads and re-installs of the PWA; empty string means
// "same origin as this page" (true when self-hosting the whole app via
// `bun run server`, where index.html and /api/* are served from one place).
const API_BASE_KEY = 'morningDewApiBase';
function getApiBase() {
  return (localStorage.getItem(API_BASE_KEY) || '').replace(/\/$/, '');
}
function apiUrl(path) {
  return getApiBase() + path;
}
// The backend URL now lives behind the ⚙ gear (see openServerSetting); this
// reflects the current value into the gear's tooltip/aria-label for at-a-glance
// confirmation of which server the app is pointed at.
function updateServerBtnLabel() {
  const base = getApiBase();
  const btn = document.getElementById('settingsBtn');
  if (!btn) return;
  const label = base ? `Server: ${base.replace(/^https?:\/\//, '')}` : 'Server: not set';
  btn.title = label;
  btn.setAttribute('aria-label', label);
}
updateServerBtnLabel();

// ---------- AI overview ----------
// Pure client-side aggregation over data the other cards already fetched —
// no extra network calls, just a different view onto the same weather/
// calendar/reminders/email state. Each load*() function below updates its
// slice and calls renderOverview(); whichever finishes last produces the
// freshest combined summary, and any slice that's still loading or failed
// is simply omitted rather than blocking the others.
const overview = { weather: null, calendar: null, reminders: null, email: null };

function isToday(iso) {
  const d = new Date(iso);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

function isTomorrow(iso) {
  const d = new Date(iso);
  const t = new Date();
  t.setDate(t.getDate() + 1);
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

// ---------- Local stores (single-user, on-device): tasks, review, streak ----------
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function lsGet(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch { /* quota */ } }

const TASKS_KEY = 'morningDewTasks';
function loadTasks() { return lsGet(TASKS_KEY, []); }
function saveTasks(t) { lsSet(TASKS_KEY, t); }
function addTask(title) {
  const t = loadTasks();
  t.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title: title.trim(), done: false, due: localDateStr(new Date()), createdAt: Date.now() });
  saveTasks(t);
}
function mutateTask(id, fn) { const t = loadTasks(); const x = t.find((i) => i.id === id); if (x) fn(x, t); saveTasks(t); }
function toggleTask(id) { mutateTask(id, (x) => { x.done = !x.done; x.doneAt = x.done ? Date.now() : null; }); }
function snoozeTask(id) {
  mutateTask(id, (x) => { const d = new Date(); d.setDate(d.getDate() + 1); x.due = localDateStr(d); });
}
function deleteTask(id) { saveTasks(loadTasks().filter((t) => t.id !== id)); }
// App tasks that belong on today's list: not done, due today or overdue.
function appTasksForToday() {
  const today = localDateStr(new Date());
  return loadTasks().filter((t) => !t.done && (!t.due || t.due <= today));
}

const REVIEW_KEY = 'morningDewReview';
const STREAK_KEY = 'morningDewStreak';
function isReviewedToday() { const r = lsGet(REVIEW_KEY, {}); return !!r[localDateStr(new Date())]; }
function finishReview(note) {
  const today = localDateStr(new Date());
  const r = lsGet(REVIEW_KEY, {}); r[today] = { reviewed: true, note: note || '', at: Date.now() }; lsSet(REVIEW_KEY, r);
  // Streak: +1 if last review was yesterday, reset to 1 on a gap, no-op if already today.
  const s = lsGet(STREAK_KEY, { count: 0, lastDate: null });
  const y = new Date(); y.setDate(y.getDate() - 1);
  if (s.lastDate === today) { /* already counted */ }
  else if (s.lastDate === localDateStr(y)) { s.count += 1; s.lastDate = today; }
  else { s.count = 1; s.lastDate = today; }
  lsSet(STREAK_KEY, s);
}
function currentStreak() {
  const s = lsGet(STREAK_KEY, { count: 0, lastDate: null });
  if (!s.lastDate || !s.count) return 0;
  const today = localDateStr(new Date());
  const y = new Date(); y.setDate(y.getDate() - 1);
  // Streak only "counts" if kept up to yesterday/today; otherwise it's lapsed.
  return (s.lastDate === today || s.lastDate === localDateStr(y)) ? s.count : 0;
}

function fmtClock(iso) {
  return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function fmtDuration(ms) {
  const mins = Math.round(ms / 60000);
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// Finds the largest open gap between now and the end of the day, given
// today's (sorted, non-all-day) events — used to answer "when am I free?"
// rather than just listing what's busy.
function findFreeBlock(todaysEvents) {
  const now = new Date();
  const dayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 0, 0);
  const busy = todaysEvents
    .filter((ev) => !ev.allDay)
    .map((ev) => ({ start: new Date(ev.start), end: ev.end ? new Date(ev.end) : new Date(new Date(ev.start).getTime() + 30 * 60000) }))
    .filter((ev) => ev.end > now)
    .sort((a, b) => a.start - b.start);

  let cursor = now;
  let best = null;
  for (const ev of busy) {
    const gapStart = cursor;
    const gapEnd = ev.start > cursor ? ev.start : cursor;
    if (gapEnd > gapStart) {
      const gapMs = gapEnd - gapStart;
      if (!best || gapMs > best.ms) best = { start: gapStart, end: gapEnd, ms: gapMs };
    }
    if (ev.end > cursor) cursor = ev.end;
  }
  if (cursor < dayEnd) {
    const gapMs = dayEnd - cursor;
    if (!best || gapMs > best.ms) best = { start: cursor, end: dayEnd, ms: gapMs };
  }
  return best;
}

function renderGlance() {
  const card = document.getElementById('overviewCard');
  const lines = [];

  if (overview.weather) {
    const { label, temp, precip, fallback, nudges } = overview.weather;
    lines.push(`<div class="overview-line"><span class="icon">🌡️</span><span>${temp}° and ${label.toLowerCase()}, ${precip}% chance of rain${fallback ? ' (showing Brisbane — location unavailable)' : ''}.</span></div>`);
    (nudges || []).forEach((n) => {
      lines.push(`<div class="overview-line"><span class="icon">${n.icon}</span><span>${escapeHtml(n.text)}</span></div>`);
    });
  }

  if (overview.calendar) {
    const todays = overview.calendar.filter((ev) => isToday(ev.start)).sort((a, b) => new Date(a.start) - new Date(b.start));
    const now = new Date();
    const upcoming = todays.filter((ev) => ev.allDay || new Date(ev.end || ev.start) > now);
    if (!todays.length) {
      lines.push(`<div class="overview-line"><span class="icon">📅</span><span>Nothing on the calendar today.</span></div>`);
    } else if (!upcoming.length) {
      lines.push(`<div class="overview-line"><span class="icon">📅</span><span>${todays.length} event${todays.length > 1 ? 's' : ''} today, all done.</span></div>`);
    } else {
      const next = upcoming[0];
      lines.push(`<div class="overview-line"><span class="icon">📅</span><span>${todays.length} event${todays.length > 1 ? 's' : ''} today — next: ${next.summary}${next.allDay ? ' (all day)' : ' at ' + fmtClock(next.start)}.</span></div>`);
    }
    const free = findFreeBlock(todays);
    if (free && free.ms >= 15 * 60000) {
      lines.push(`<div class="overview-line"><span class="icon">🕒</span><span>Free for ${fmtDuration(free.ms)}, until ${fmtClock(free.end)}.</span></div>`);
    }
  }

  if (overview.reminders) {
    const dueToday = overview.reminders.filter((ev) => isToday(ev.start)).length;
    if (dueToday) {
      lines.push(`<div class="overview-line"><span class="icon">✅</span><span>${dueToday} reminder${dueToday > 1 ? 's' : ''} due today.</span></div>`);
    }
  }

  if (overview.email) {
    const { urgent } = overview.email;
    if (urgent > 0) {
      lines.push(`<div class="overview-line"><span class="icon">✉️</span><span>${urgent} urgent email${urgent > 1 ? 's' : ''} waiting.</span></div>`);
    }
  }

  if (!lines.length) {
    card.innerHTML = `<div class="overview-label">Today at a glance</div><div class="overview-line"><span class="icon">⏳</span><span>Building your overview...</span></div>`;
    return;
  }
  // Home is one screen — keep the glance compact (top 3 lines).
  card.innerHTML = `<div class="overview-label">Today at a glance</div>${lines.slice(0, 3).join('')}`;
}

// ---------- AI Morning Brief ----------
const BRIEF_KEY = 'morningDewBrief';
// 3 hours: long enough to skip needless regeneration cost on every app open,
// short enough that the brief still reflects the day as it evolves.
const BRIEF_STALE_MS = 3 * 60 * 60 * 1000;
function cachedBrief() {
  const b = lsGet(BRIEF_KEY, null);
  if (!b || b.date !== localDateStr(new Date())) return null;
  if (b.generatedAt && Date.now() - b.generatedAt > BRIEF_STALE_MS) return null;
  const health = overview.health || lsGet(HEALTH_CACHE_KEY, null);
  const currentHealthUpdatedAt = (health && health.updatedAt) || null;
  if (b.healthUpdatedAt !== undefined && b.healthUpdatedAt !== currentHealthUpdatedAt) return null;
  return { brief: b.brief, structured: !!b.structured };
}
// brief is either a structured object ({headline, opener, sections, tomorrow})
// from the redesigned AI prompt, or a legacy flat markdown string.
function briefHeadline(brief) {
  if (!brief) return '';
  if (typeof brief === 'object') return (brief.headline || '').replace(/\*\*/g, '').trim();
  const h = brief.split('\n').find((l) => l.startsWith('## '));
  return (h ? h.slice(3) : brief.split('\n').find((l) => l.trim())).replace(/\*\*/g, '').trim();
}
// Tiny markdown → HTML for the brief (## heading, **bold**, - bullets).
function mdToHtml(md) {
  const lines = escapeHtml(md).split('\n');
  let html = '';
  let inList = false;
  for (const raw of lines) {
    const line = raw.trim();
    const bold = (s) => s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    if (line.startsWith('### ')) { if (inList) { html += '</ul>'; inList = false; } html += `<h3 class="brief-h3">${bold(line.slice(4))}</h3>`; }
    else if (line.startsWith('## ')) { if (inList) { html += '</ul>'; inList = false; } html += `<h2 class="brief-h">${bold(line.slice(3))}</h2>`; }
    else if (line.startsWith('- ')) { if (!inList) { html += '<ul class="brief-ul">'; inList = true; } html += `<li>${bold(line.slice(2))}</li>`; }
    else if (!line) { if (inList) { html += '</ul>'; inList = false; } }
    else { if (inList) { html += '</ul>'; inList = false; } html += `<p class="brief-p">${bold(line)}</p>`; }
  }
  if (inList) html += '</ul>';
  return html;
}
function briefContext() {
  const now = new Date();
  const evs = todaysEvents().map((e) => ({
    title: e.summary,
    start: e.allDay ? 'all day' : fmtClock(e.start),
    end: e.end && !e.allDay ? fmtClock(e.end) : null,
    location: e.location || null,
    source: e.source || null,
  }));
  const freeBlocks = allFreeBlocks(overview.calendar || [])
    .map((b) => ({ from: fmtClock(b.start.toISOString()), to: fmtClock(b.end.toISOString()), minutes: Math.round(b.ms / 60000) }))
    .filter((b) => b.minutes >= 20);
  const tasks = [
    ...appTasksForToday().map((t) => ({ title: t.title, kind: 'task' })),
    ...todaysReminders().map((r) => ({ title: r.summary, due: r.start ? fmtClock(r.start) : null, kind: 'reminder' })),
  ];

  // Rich weather from the raw Open-Meteo payload when available.
  let weather = null;
  const raw = overview.weatherRaw;
  if (raw && raw.current) {
    const cur = raw.current, daily = raw.daily || {}, hourly = raw.hourly;
    let rainPeak = null;
    if (hourly && hourly.time) {
      let peak = { p: -1, t: null };
      for (let i = 0; i < hourly.time.length; i++) {
        const tt = new Date(hourly.time[i]).getTime();
        if (tt < now.getTime() - 3600000 || tt > now.getTime() + 12 * 3600000) continue;
        const p = hourly.precipitation_probability ? (hourly.precipitation_probability[i] ?? 0) : 0;
        if (p > peak.p) peak = { p, t: hourly.time[i] };
      }
      if (peak.p >= 30) rainPeak = { chance: peak.p, time: fmtClock(peak.t) };
    }
    weather = {
      now: `${Math.round(cur.temperature_2m)}° ${describeWeather(cur.weather_code)[0]}`,
      feelsLike: cur.apparent_temperature != null ? Math.round(cur.apparent_temperature) : null,
      high: daily.temperature_2m_max ? Math.round(daily.temperature_2m_max[0]) : null,
      low: daily.temperature_2m_min ? Math.round(daily.temperature_2m_min[0]) : null,
      rainChanceNow: Math.round(cur.precipitation_probability ?? 0),
      rainPeak,
      uvMax: daily.uv_index_max ? Math.round(daily.uv_index_max[0]) : null,
      sunrise: daily.sunrise ? fmtClock(daily.sunrise[0]) : null,
      sunset: daily.sunset ? fmtClock(daily.sunset[0]) : null,
      isDaytime: cur.is_day !== 0,
    };
  } else if (overview.weather) {
    weather = { now: `${overview.weather.temp}° ${overview.weather.label}`, rainChanceNow: overview.weather.precip };
  }

  const email = overview.emailData ? {
    urgent: overview.emailData.urgent.length,
    unread: overview.emailData.recent.length,
    urgentItems: overview.emailData.urgent.slice(0, 5).map((m) => ({ from: senderName(m.from), subject: m.subject })),
  } : null;

  const health = overview.health || lsGet(HEALTH_CACHE_KEY, null);
  const trend = recoveryTrend();
  const recovery = (health && health.recovery != null)
    ? {
        score: health.recovery,
        band: health.recovery >= 67 ? 'high' : health.recovery >= 34 ? 'moderate' : 'low',
        read: recoveryWord(health.recovery),
        source: health.source || null,
        hrv: health.hrv != null ? Math.round(health.hrv) : null,
        restingHeartRate: health.restingHeartRate != null ? Math.round(health.restingHeartRate) : null,
        sleepHours: health.sleepHours != null ? health.sleepHours : null,
        vsPrevious: trend ? { delta: trend.delta, previousScore: trend.previousScore, previousDate: trend.previousDate } : null,
        recent: recoveryHistory().slice(0, 7),
      }
    : null;
  const sleep = (health && health.sleep != null) ? { score: health.sleep, read: sleepWord(health.sleep) } : null;
  const strain = (health && health.strain != null) ? { score: health.strain, read: strainWord(health.strain) } : null;
  const targetStrain = targetStrainRange(health && health.recovery != null ? health.recovery : null);

  // Tomorrow's plan input: /api/calendar and /api/reminders already return a
  // 48h window (see fetchIcsEvents in server.js), so this is a pure client-side
  // filter — no extra fetch needed. Email has no per-item date, so we hand the
  // model the same urgent list and let it judge tomorrow-relevance contextually.
  const tomorrowEvents = (overview.calendar || [])
    .filter((e) => e.start && isTomorrow(e.start))
    .map((e) => ({ title: e.summary, start: e.allDay ? 'all day' : fmtClock(e.start), location: e.location || null }));
  const tomorrowReminders = (overview.reminders || [])
    .filter((r) => !r.start || isTomorrow(r.start))
    .map((r) => ({ title: r.summary, due: r.start ? fmtClock(r.start) : null }));
  const tomorrow = (tomorrowEvents.length || tomorrowReminders.length || (email && email.urgentItems.length))
    ? { events: tomorrowEvents, reminders: tomorrowReminders, possiblyRelevantEmail: email ? email.urgentItems : [] }
    : null;

  const hour = now.getHours();
  return {
    localTime: fmtClock(now.toISOString()),
    date: now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }),
    partOfDay: hour < 12 ? 'morning' : hour < 17 ? 'afternoon' : 'evening',
    location: overview.locationLabel || null,
    recovery,
    sleep,
    strain,
    targetStrain,
    streakDays: currentStreak(),
    weather,
    events: evs,
    freeBlocks,
    tasks,
    email,
    tomorrow,
  };
}
async function fetchBrief(force) {
  if (!force) {
    const c = cachedBrief();
    if (c) { overview.brief = c.brief; overview.briefStructured = c.structured; renderOverview(); return; }
  }
  if (overview.briefFetching) return;
  // Wait until the core data is in so the brief is built from a full picture.
  if (overview.weatherReached === undefined || overview.calendarReached === undefined || overview.healthConfigured === undefined) return;
  overview.briefFetching = true;
  if (debriefOpen) renderDebriefPage();
  try {
    const res = await fetchWithTimeout(apiUrl('/api/brief'), {
      method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(briefContext()),
    }, 100000);
    const data = await res.json();
    if (data.configured === false) { overview.briefConfigured = false; }
    else if (data.brief) {
      overview.brief = data.brief;
      overview.briefStructured = !!data.structured;
      overview.briefConfigured = true;
      const healthNow = overview.health || lsGet(HEALTH_CACHE_KEY, null);
      lsSet(BRIEF_KEY, {
        date: localDateStr(new Date()),
        brief: data.brief,
        structured: !!data.structured,
        generatedAt: Date.now(),
        healthUpdatedAt: (healthNow && healthNow.updatedAt) || null,
      });
    } else if (data.error) {
      overview.briefError = data.error;
    }
  } catch (err) {
    overview.briefError = 'Request timed out — try again in a moment.';
  } finally {
    overview.briefFetching = false;
    renderOverview();
    if (debriefOpen) renderDebriefPage();
  }
}

const PUSH_KEY = 'morningDewPush';
function pushSupported() { return 'serviceWorker' in navigator && 'PushManager' in window; }
function pushEnabled() { return localStorage.getItem(PUSH_KEY) === 'on'; }
function pushButtonHtml() {
  if (!pushSupported()) return `<div class="push-status">🔔 Add to your Home Screen to enable morning alerts</div>`;
  return pushEnabled()
    ? `<div class="push-status">🔔 Morning notifications on</div>`
    : `<button class="brief-refresh" data-enable-push>🔔 Get this brief at 7am</button>`;
}
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - (b64.length % 4)) % 4);
  const base = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base);
  return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}
async function enablePush() {
  if (!pushSupported()) { alert('Notifications need the installed app. Add Morning Dew to your Home Screen first, then try again.'); return; }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { alert('Notifications were not allowed. You can enable them in Settings.'); return; }
    const cfg = await (await fetchWithTimeout(apiUrl('/api/push/config'))).json();
    if (!cfg.configured || !cfg.publicKey) { alert('Push is not set up on the server yet (VAPID keys + Upstash).'); return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(cfg.publicKey) });
    const res = await fetchWithTimeout(apiUrl('/api/push/subscribe'), { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(sub) });
    if (!res.ok) throw new Error('server rejected the subscription');
    localStorage.setItem(PUSH_KEY, 'on');
    refreshOpenSection();
    alert('Morning brief notifications enabled. You will get a nudge around 7am.');
  } catch (err) {
    alert('Could not enable notifications: ' + (err.message || err));
  }
}

function describeWeather(code) { return WEATHER_CODES[code] || ['Unknown', '❔']; }

async function fetchWithTimeout(url, opts = {}, ms = FETCH_TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    return await fetch(url, { ...opts, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

function renderGreeting() {
  const now = new Date();
  setGreeting();
  document.getElementById('dateLabel').textContent = now.toLocaleDateString(undefined, {
    weekday: 'long', month: 'long', day: 'numeric',
  });
}

// ---------- Weather ----------
// Live location, with a hard-capped wait. The original "Fetching weather..."
// hang was navigator.geolocation.getCurrentPosition never resolving when the
// permission prompt was dismissed/ignored/previously-denied — no timeout was
// ever set on it. Fixed by racing it against a manual timer in addition to
// the API's own (unreliable on iOS) `timeout` option, and falling back to
// Brisbane (the original fixed location) if geolocation fails or times out,
// so the weather card never hangs no matter what the user does with the
// permission prompt.
const GEO_TIMEOUT_MS = 8000;

function getCurrentPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('geolocation unsupported'));
      return;
    }
    const timer = setTimeout(() => reject(new Error('geolocation timed out')), GEO_TIMEOUT_MS);
    navigator.geolocation.getCurrentPosition(
      (pos) => { clearTimeout(timer); resolve(pos); },
      (err) => { clearTimeout(timer); reject(err); },
      { enableHighAccuracy: false, timeout: GEO_TIMEOUT_MS, maximumAge: 5 * 60 * 1000 }
    );
  });
}

// Best-effort, no API key — BigDataCloud's free reverse-geocode endpoint is
// CORS-enabled and keyless. Never blocks weather: failure just leaves the
// generic "Current location" label in place.
async function updateLocationLabel(latitude, longitude) {
  try {
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`;
    const res = await fetchWithTimeout(url);
    if (!res.ok) return;
    const data = await res.json();
    const place = data.locality || data.city || data.principalSubdivision;
    if (place) {
      overview.locationLabel = data.principalSubdivision && place !== data.principalSubdivision
        ? `${place}, ${data.principalSubdivision}`
        : place;
      renderHome();
      if (currentDetail === 'weather') openDetail('weather');
    }
  } catch {
    // Best-effort only — coordinates-based weather already loaded fine.
  }
}

// Open-Meteo (with timezone=auto) returns hourly/daily timestamps as naive
// local time for the QUERIED location, with no UTC offset in the string
// (e.g. "2026-06-30T07:00"). `new Date(...)` on an offset-less string is
// parsed as local time in the DEVICE's own timezone, not the location's —
// so whenever the two differ (the Brisbane geolocation fallback while the
// device is elsewhere, travel, etc.) every derived time (sunrise/sunset,
// the hourly "Now" marker, rain-peak time) silently drifts by the gap
// between the two zones. Re-anchor each naive string to its real UTC
// instant using the response's own utc_offset_seconds before anything else
// reads it, so all the comparisons/labels downstream are correct regardless
// of what timezone the device itself is set to.
function reanchorWeatherTimes(data) {
  const offsetSec = data.utc_offset_seconds || 0;
  const fix = (s) => new Date(Date.parse(s + 'Z') - offsetSec * 1000).toISOString();
  if (data.hourly && data.hourly.time) data.hourly.time = data.hourly.time.map(fix);
  if (data.daily) {
    if (data.daily.sunrise) data.daily.sunrise = data.daily.sunrise.map(fix);
    if (data.daily.sunset) data.daily.sunset = data.daily.sunset.map(fix);
  }
}

async function loadWeather() {
  let { latitude, longitude } = BRISBANE;
  overview.locationLabel = 'Current location';
  let usedFallback = false;
  try {
    const pos = await getCurrentPosition();
    latitude = pos.coords.latitude;
    longitude = pos.coords.longitude;
    updateLocationLabel(latitude, longitude);
  } catch {
    overview.locationLabel = 'Brisbane, QLD (location unavailable)';
    usedFallback = true;
  }

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation_probability,wind_speed_10m,weather_code,uv_index,is_day`
      + `&hourly=temperature_2m,precipitation_probability,weather_code`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,sunrise,sunset`
      + `&timezone=auto&forecast_days=7`;
    const res = await fetchWithTimeout(url);
    if (!res.ok) throw new Error(`weather request failed: ${res.status}`);
    const data = await res.json();
    reanchorWeatherTimes(data);
    const cur = data.current;
    const daily = data.daily;
    const [label, icon] = describeWeather(cur.weather_code);

    applyTheme(cur.is_day);

    overview.weather = {
      label,
      icon,
      temp: Math.round(cur.temperature_2m),
      precip: Math.round(cur.precipitation_probability ?? 0),
      fallback: usedFallback,
      nudges: weatherNudges(cur, data.hourly, daily),
    };
    overview.weatherRaw = { current: cur, hourly: data.hourly, daily };
    overview.weatherReached = true;
    renderOverview();
    renderHome();
    fetchBrief();
    if (currentDetail === 'weather') openDetail('weather');
  } catch (err) {
    overview.weatherReached = false;
    renderHome();
    if (currentDetail === 'weather') openDetail('weather');
  }
}

// Recolors the ambient background by time of day. Uses the API's is_day when
// available, otherwise the device clock.
function applyTheme(isDay) {
  const hour = new Date().getHours();
  let period;
  if (isDay === 0) period = hour < 5 || hour >= 20 ? 'night' : 'dusk';
  else if (hour >= 5 && hour < 8) period = 'dawn';
  else if (hour >= 8 && hour < 17) period = 'day';
  else if (hour >= 17 && hour < 20) period = 'dusk';
  else period = 'night';
  document.body.classList.remove('theme-dawn', 'theme-day', 'theme-dusk', 'theme-night');
  document.body.classList.add('theme-' + period);
}

// Builds actionable {icon,text} weather lines from current/hourly/daily data.
function weatherNudges(cur, hourly, daily) {
  const out = [];
  // Umbrella — scan the next 12 hours for a rain-probability peak.
  if (hourly && hourly.time) {
    const now = Date.now();
    let peak = { p: -1, time: null };
    let count = 0;
    for (let i = 0; i < hourly.time.length && count < 12; i++) {
      const t = new Date(hourly.time[i]).getTime();
      if (t < now - 3600000) continue;
      count++;
      const p = hourly.precipitation_probability[i] ?? 0;
      if (p > peak.p) peak = { p, time: hourly.time[i] };
    }
    if (peak.p >= 50) {
      out.push({ icon: '☔', text: `Umbrella — ${Math.round(peak.p)}% rain around ${fmtClock(peak.time)}.` });
    }
  }
  // UV — high index today.
  if (daily && daily.uv_index_max) {
    const uv = Math.round(daily.uv_index_max[0] ?? 0);
    if (uv >= 6) out.push({ icon: '🧴', text: `High UV (${uv}) today — wear sunscreen.` });
  }
  // Temperature extremes today.
  if (daily && daily.temperature_2m_min) {
    const lo = Math.round(daily.temperature_2m_min[0]);
    const hi = Math.round(daily.temperature_2m_max[0]);
    if (lo <= 10) out.push({ icon: '🧥', text: `Chilly start at ${lo}° — take a layer.` });
    if (hi >= 32) out.push({ icon: '🥵', text: `Hot day, up to ${hi}° — stay hydrated.` });
  }
  return out;
}

// Next ~18 hours, horizontally scrollable. Returns HTML for the weather section.
function hourlyHtml(hourly) {
  if (!hourly || !hourly.time || !hourly.time.length) {
    return `<div class="empty-state">Hourly forecast unavailable.</div>`;
  }
  const now = Date.now();
  let start = hourly.time.findIndex((t) => new Date(t).getTime() >= now - 3600000);
  if (start < 0) start = 0;
  const cells = [];
  for (let i = start; i < hourly.time.length && cells.length < 18; i++) {
    const d = new Date(hourly.time[i]);
    const isNow = cells.length === 0;
    const label = isNow ? 'Now' : d.toLocaleTimeString(undefined, { hour: 'numeric' });
    const [, icon] = describeWeather(hourly.weather_code[i]);
    const temp = Math.round(hourly.temperature_2m[i]);
    const rain = Math.round(hourly.precipitation_probability[i] ?? 0);
    cells.push(`
      <div class="hour-cell">
        <span class="hc-time">${escapeHtml(label)}</span>
        <span class="hc-icon">${icon}</span>
        <span class="hc-temp">${temp}°</span>
        <span class="hc-rain">${rain >= 10 ? '💧' + rain + '%' : ''}</span>
      </div>`);
  }
  return `<div class="hourly-strip">${cells.join('')}</div>`;
}

// Map a temperature to a color on a cold→hot scale (blue → red).
function tempColor(t) {
  const hue = Math.max(0, Math.min(210, 210 - (t / 40) * 210));
  return `hsl(${hue}, 80%, 58%)`;
}

function forecastHtml(daily) {
  if (!daily || !daily.time || !daily.time.length) {
    return `<div class="empty-state">Forecast unavailable.</div>`;
  }
  const highs = daily.temperature_2m_max;
  const lows = daily.temperature_2m_min;
  const weekMax = Math.max(...highs);
  const weekMin = Math.min(...lows);
  const span = weekMax - weekMin || 1;

  const rows = daily.time.map((iso, i) => {
    const d = new Date(iso + 'T00:00');
    const dayLabel = i === 0 ? 'Today' : d.toLocaleDateString(undefined, { weekday: 'short' });
    const [, icon] = describeWeather(daily.weather_code[i]);
    const rain = Math.round(daily.precipitation_probability_max[i] ?? 0);
    const lo = Math.round(lows[i]);
    const hi = Math.round(highs[i]);

    const left = ((lows[i] - weekMin) / span) * 100;
    const width = Math.max(6, ((highs[i] - lows[i]) / span) * 100);
    const fill = `left:${left}%;width:${width}%;background:linear-gradient(90deg, ${tempColor(lows[i])}, ${tempColor(highs[i])});`;

    return `
      <div class="forecast-row">
        <span class="fc-day">${dayLabel}</span>
        <span class="fc-icon">${icon}</span>
        <span class="fc-rain ${rain > 0 ? '' : 'dry'}">${rain > 0 ? '💧' + rain + '%' : '—'}</span>
        <span class="fc-temps">
          <span class="fc-lo">${lo}°</span>
          <span class="fc-track"><span class="fc-fill" style="${fill}"></span></span>
          <span class="fc-hi">${hi}°</span>
        </span>
      </div>`;
  });

  return rows.join('');
}

// ---------- Calendar / Reminders → unified Today timeline ----------
function fmtEventTime(iso, allDay) {
  if (!iso) return '';
  const d = new Date(iso);
  if (allDay) return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  return d.toLocaleString(undefined, { weekday: 'short', hour: 'numeric', minute: '2-digit' });
}

// Refreshes the home tiles + (if open) the Schedule/Tasks sections from the
// already-fetched overview.calendar / overview.reminders — no extra network.
function renderToday() {
  renderHome();
  if (currentDetail === 'schedule') openDetail('schedule');
  // Tasks intentionally NOT re-opened on background refresh — it would wipe the
  // checklist input mid-type. Its app-task list re-renders on your edits instead.
}

function todaysEvents() {
  return (overview.calendar || [])
    .filter((ev) => ev.start && isToday(ev.start))
    .sort((a, b) => (a.allDay ? 0 : new Date(a.start)) - (b.allDay ? 0 : new Date(b.start)));
}
function todaysReminders() {
  return (overview.reminders || []).filter((r) => !r.start || isToday(r.start));
}

// Schedule section body: today's events as an Apple-Calendar-style day timeline.
function scheduleListHtml() {
  if (overview.calendarReached === false) return `<div class="error-state">Couldn't reach the calendar. Pull down to retry.</div>`;
  if (overview.calendarReached === undefined) return `<div class="loading-state">Loading…</div>`;
  const events = todaysEvents();
  const errNote = overview.calendarError ? `<div class="error-state">Some calendars didn't load: ${escapeHtml(overview.calendarError)}</div>` : '';
  if (!events.length) return errNote || `<div class="empty-state">No events today. 🌤️</div>`;
  return errNote + dayTimelineHtml(events);
}

// Lays out today's events on a 24-hour vertical grid (Apple Calendar style):
// hour rule lines on the left, time-positioned blocks on the right, a red
// "now" line, simple greedy column-packing for overlapping events.
function dayTimelineHtml(events) {
  const HOUR_PX = 56;
  const allDay = events.filter((ev) => ev.allDay);
  const timed = events.filter((ev) => !ev.allDay);
  const dayStart = new Date();
  dayStart.setHours(0, 0, 0, 0);
  const minsFrom = (iso) => (new Date(iso) - dayStart) / 60000;

  const allDayHtml = allDay.length
    ? `<div class="day-tl-allday">${allDay.map((ev) => `<div class="day-tl-allday-chip">${escapeHtml(ev.summary)}</div>`).join('')}</div>`
    : '';

  const hoursHtml = Array.from({ length: 24 }, (_, h) => {
    const label = h === 0 ? '12 AM' : h < 12 ? `${h} AM` : h === 12 ? '12 PM' : `${h - 12} PM`;
    return `<div class="day-tl-hour" style="top:${h * HOUR_PX}px"><span class="day-tl-hour-label">${label}</span><span class="day-tl-hour-line"></span></div>`;
  }).join('');

  // Greedy column packing so overlapping events sit side-by-side instead of stacking.
  const sorted = [...timed].sort((a, b) => new Date(a.start) - new Date(b.start));
  const colEnds = [];
  const placed = sorted.map((ev) => {
    const start = Math.max(0, minsFrom(ev.start));
    const end = Math.max(start + 20, minsFrom(ev.end || ev.start));
    let col = colEnds.findIndex((endMins) => endMins <= start);
    if (col === -1) { col = colEnds.length; colEnds.push(end); } else { colEnds[col] = end; }
    return { ev, start, end, col };
  });
  const maxCol = Math.max(1, ...placed.map((p) => p.col + 1));

  const eventsHtml = placed.map(({ ev, start, end, col }) => {
    const top = (start / 60) * HOUR_PX;
    const height = Math.max(22, ((end - start) / 60) * HOUR_PX - 2);
    const width = 100 / maxCol;
    const left = col * width;
    return `<a class="day-tl-event" href="calshow://" style="top:${top}px;height:${height}px;left:calc(${left}% + 52px);width:calc(${width}% - 56px - 0.4rem);">
      <span class="day-tl-event-title">${escapeHtml(ev.summary)}</span>
      <span class="day-tl-event-time">${escapeHtml(fmtClock(ev.start))}</span>
    </a>`;
  }).join('');

  const nowMins = (new Date() - dayStart) / 60000;
  const nowHtml = `<div class="day-tl-now" style="top:${(nowMins / 60) * HOUR_PX}px"><span class="day-tl-now-dot"></span></div>`;

  return `${allDayHtml}<div class="day-timeline" style="height:${24 * HOUR_PX}px">${hoursHtml}${eventsHtml}${nowHtml}</div>`;
}

// Tasks section body: today/undated reminders as a checklist.
function tasksListHtml() {
  if (overview.remindersReached === false) return `<div class="error-state">Couldn't reach reminders. Pull down to retry.</div>`;
  if (overview.remindersReached === undefined) return `<div class="loading-state">Loading…</div>`;
  if (overview.remindersConfigured === false) return `<div class="placeholder-state">No reminders feed connected. Set <code>REMINDERS_ICS_URL</code> on the server.</div>`;
  const rems = todaysReminders();
  const errNote = overview.remindersError ? `<div class="error-state">Some reminders didn't load: ${escapeHtml(overview.remindersError)}</div>` : '';
  if (!rems.length) return errNote || `<div class="empty-state">No tasks due today. ✅</div>`;
  return errNote + rems.map((r) => `

// ---------- Email (Outlook-style) ----------
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// "TikTok" <no-reply@tiktok.com>  ->  TikTok   |   bob@x.com -> bob
function senderName(from) {
  if (!from) return 'Unknown';
  const m = from.match(/^\s*"?([^"<]*?)"?\s*<.*>\s*$/);
  let name = m && m[1] ? m[1].trim() : '';
  if (!name) {
    const emailMatch = from.match(/[\w.+-]+@[\w.-]+/);
    name = emailMatch ? emailMatch[0].split('@')[0] : from.trim();
  }
  return name || 'Unknown';
}

const AVATAR_COLORS = ['#3a8dff', '#7c5cff', '#e0457b', '#1aa179', '#d98300', '#0a8fa6', '#b5468a', '#5a7d2a'];
function avatarColor(key) {
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

// Outlook-style relative date: today -> time, this week -> weekday, else -> date.
function fmtMailDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  const days = Math.floor((now - d) / 86400000);
  if (days >= 0 && days < 7) return d.toLocaleDateString(undefined, { weekday: 'long' });
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// Deep link straight to the exact message, by its source. Outlook messages use
// the real Graph webLink — iOS registers outlook.office.com/office365.com as
// Universal Link domains, so tapping that exact URL opens the Outlook app
// directly when installed and falls back to Safari automatically when it's
// not, with no custom URL scheme needed. Gmail messages open in Gmail (app or
// web) by their API id. The Outlook iOS app can't be pointed at a specific
// Gmail message, so opening the precise email means opening it via its own
// provider.
function mailUrl(m) {
  if (m.source === 'Outlook') {
    if (m.webLink) return m.webLink;
    if (m.id) return `https://outlook.office.com/mail/inbox/id/${encodeURIComponent(m.id)}`;
  }
  if (m.id) {
    return `https://mail.google.com/mail/u/0/#all/${encodeURIComponent(m.id)}`;
  }
  return 'ms-outlook://';
}

function mailRow(m) {
  const name = senderName(m.from);
  const initial = escapeHtml(name.charAt(0).toUpperCase() || '?');
  const color = avatarColor(name + (m.source || ''));
  return `
    <a class="mail-row" href="${escapeHtml(mailUrl(m))}">
      <span class="mail-unread-dot"></span>
      <span class="mail-avatar" style="background:${color}">${initial}</span>
      <span class="mail-body">
        <span class="mail-top">
          <span class="mail-sender">${escapeHtml(name)}</span>
          <span class="mail-date">${escapeHtml(fmtMailDate(m.date))}</span>
        </span>
        <span class="mail-subject">${escapeHtml(m.subject)}</span>
        <span class="mail-snippet">${escapeHtml(m.snippet)}</span>
      </span>
    </a>`;
}

// Mail list HTML for a section (returns a string, no DOM write).
function mailListHtml(items, emptyMsg) {
  if (!items.length) return `<div class="empty-state">${emptyMsg}</div>`;
  return `<div class="mail-scroll">${items.map(mailRow).join('')}</div>`;
