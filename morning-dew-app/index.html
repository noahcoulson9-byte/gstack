// ---- Today detail: in-depth day plan ----
function allFreeBlocks(events) {
  const now = new Date();
  const dayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 22, 0, 0);
  const busy = events
    .filter((ev) => ev.start && !ev.allDay && isToday(ev.start))
    .map((ev) => ({ start: new Date(ev.start), end: ev.end ? new Date(ev.end) : new Date(new Date(ev.start).getTime() + 30 * 60000) }))
    .filter((ev) => ev.end > now)
    .sort((a, b) => a.start - b.start);
  const blocks = [];
  let cursor = now;
  for (const ev of busy) {
    if (ev.start > cursor) blocks.push({ start: cursor, end: ev.start, ms: ev.start - cursor });
    if (ev.end > cursor) cursor = ev.end;
  }
  if (cursor < dayEnd) blocks.push({ start: cursor, end: dayEnd, ms: dayEnd - cursor });
  return blocks.filter((b) => b.ms >= 15 * 60000);
}

function todayDetailHtml() {
  if (overview.calendarReached === false && overview.remindersReached === false) {
    return `<section class="glass insight-card"><div class="error-state">Couldn't reach the service. Pull down to retry.</div></section>`;
  }
  const events = (overview.calendar || []).filter((ev) => ev.start && isToday(ev.start)).sort((a, b) => new Date(a.start) - new Date(b.start));
  const reminders = (overview.reminders || []).filter((r) => !r.start || isToday(r.start));
  const timed = events.filter((ev) => !ev.allDay);
  const free = allFreeBlocks(overview.calendar || []);
  const biggest = free.reduce((a, b) => (!a || b.ms > a.ms ? b : a), null);
  const now = new Date();

  // Recommended plan
  const plan = [];
  if (!events.length && !reminders.length) {
    plan.push({ ico: '🌤️', text: 'Clear day — nothing scheduled. A good chance to get ahead or genuinely rest.' });
  }
  if (timed.length) {
    const next = timed.find((ev) => new Date(ev.end || ev.start) > now);
    if (next) {
      const mins = Math.round((new Date(next.start) - now) / 60000);
      plan.push({ ico: '⏭️', text: `Next up: <b>${escapeHtml(next.summary)}</b> at ${fmtClock(next.start)}${mins > 0 && mins < 180 ? ` (in ${fmtDuration(mins * 60000)})` : ''}.` });
    }
  }
  if (biggest) {
    plan.push({ ico: '🎯', text: `Your best free block is <b>${fmtClock(biggest.start)}–${fmtClock(biggest.end)}</b> (${fmtDuration(biggest.ms)}). ${reminders.length ? 'Good window to clear your reminders or do focused work.' : 'Good window for focused work.'}` });
  }
  if (reminders.length) {
    const dueTimed = reminders.filter((r) => r.start && !r.allDay).sort((a, b) => new Date(a.start) - new Date(b.start));
    if (dueTimed.length) plan.push({ ico: '✅', text: `Earliest reminder due: <b>${escapeHtml(dueTimed[0].summary)}</b> at ${fmtClock(dueTimed[0].start)} — do it before then.` });
    else plan.push({ ico: '✅', text: `${reminders.length} reminder${reminders.length > 1 ? 's' : ''} with no set time — slot ${reminders.length > 1 ? 'them' : 'it'} into a free block.` });
  }
  // Tight turnarounds
  for (let i = 1; i < timed.length; i++) {
    const gap = (new Date(timed[i].start) - new Date(timed[i - 1].end || timed[i - 1].start)) / 60000;
    if (gap >= 0 && gap < 15) {
      plan.push({ ico: '⚠️', text: `Tight gap (${Math.round(gap)} min) between <b>${escapeHtml(timed[i - 1].summary)}</b> and <b>${escapeHtml(timed[i].summary)}</b>.` });
      break;
    }
  }

  const freeBars = free.length
    ? `<section class="glass insight-card"><div class="insight-head">Free blocks today</div><div class="bars">${
        free.map((b) => barRow(`${fmtClock(b.start)}`, b.ms, Math.max(...free.map((x) => x.ms)), fmtDuration(b.ms), '#46d39a')).join('')
      }</div></section>`
    : '';

  const totalFree = free.reduce((s, b) => s + b.ms, 0);

  return `
    <section class="glass detail-hero">
      <div class="metric-big">${events.length}<span style="font-size:1.2rem;font-weight:600;color:var(--muted)"> event${events.length === 1 ? '' : 's'}</span></div>
      <div class="metric-sub">${reminders.length} reminder${reminders.length === 1 ? '' : 's'} · ${fmtDuration(totalFree)} free time left today</div>
    </section>
    <section class="glass insight-card">
      <div class="insight-head">How to plan your day</div>
      ${insightLines(plan)}
    </section>
    ${freeBars}`;
}

// ---- Inbox section: triage + sender insights + the actual email lists ----
function inboxDetailHtml() {
  if (overview.emailReached === false) return `<section class="glass insight-card"><div class="error-state">Couldn't reach the email service. Pull down to retry.</div></section>`;
  if (overview.emailConfigured === false) return `<section class="glass insight-card"><div class="placeholder-state">No email source connected yet. Set the <code>GOOGLE_*</code> (Gmail) and/or <code>MS_*</code> (Outlook) vars on the server.</div></section>`;
  const d = overview.emailData;
  if (!d) return `<section class="glass insight-card"><div class="empty-state">Email is still loading…</div></section>`;
  const all = [...d.urgent, ...d.recent];

  const counts = {};
  all.forEach((m) => { const s = senderName(m.from); counts[s] = (counts[s] || 0) + 1; });
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const maxCount = Math.max(...top.map((t) => t[1]), 1);
  const senderBars = top.map(([name, n]) => barRow(name, n, maxCount, String(n))).join('');

  const tips = [];
  if (d.urgent.length) tips.push({ ico: '🚩', text: `<b>${d.urgent.length}</b> urgent email${d.urgent.length > 1 ? 's' : ''} flagged important — clear ${d.urgent.length > 1 ? 'these' : 'this'} first.` });
  tips.push({ ico: '📥', text: `<b>${d.recent.length}</b> new unread in the last day.` });
  if (top.length) tips.push({ ico: '👤', text: `Most is from <b>${escapeHtml(top[0][0])}</b> (${top[0][1]}).` });

  const insights = all.length ? `
    <section class="glass insight-card"><div class="insight-head">Triage</div>${insightLines(tips)}</section>
    <section class="glass insight-card"><div class="insight-head">Who's emailing you</div><div class="bars">${senderBars}</div></section>` : '';

  return `
    <section class="glass detail-hero">
      <div class="metric-big">${d.recent.length}<span style="font-size:1.2rem;font-weight:600;color:var(--muted)"> new</span></div>
      <div class="metric-sub">${d.urgent.length} urgent · tap any email to open it</div>
    </section>
    ${insights}
    <section class="glass insight-card"><div class="insight-head">Urgent</div>${mailListHtml(d.urgent, 'No urgent email right now.')}</section>
    <section class="glass insight-card"><div class="insight-head">New</div>${mailListHtml(d.recent, 'No new email right now.')}</section>`;
}

// Interactions inside the detail sections (tasks, brief, review).
document.addEventListener('click', (e) => {
  const taskBtn = e.target.closest('[data-task-action]');
  if (taskBtn) {
    const id = taskBtn.getAttribute('data-task-id');
    const action = taskBtn.getAttribute('data-task-action');
    if (action === 'toggle') toggleTask(id);
    else if (action === 'snooze') snoozeTask(id);
    else if (action === 'delete') deleteTask(id);
    // Re-render just the checklist (keeps the type-ahead input intact) when in
    // the Tasks section; full re-render elsewhere.
    const listEl = document.getElementById('appTaskList');
    if (listEl) listEl.innerHTML = appTaskListInnerHtml();
    else refreshOpenSection();
    renderHome();
    return;
  }
  if (e.target.closest('[data-task-add-inline]')) { commitTaskInput(); return; }
  if (e.target.closest('[data-debrief-refresh]')) { fetchBrief(true); return; }
  if (e.target.closest('[data-debrief-back]')) { if (debriefOpen) history.back(); return; }
  const sectionEl = e.target.closest('[data-debrief-section]');
  if (sectionEl) { sectionEl.classList.toggle('expanded'); return; }
  if (e.target.closest('[data-set-recovery]')) { setRecoveryManual(); return; }
  if (e.target.closest('[data-enable-push]')) { enablePush(); return; }
  if (e.target.closest('[data-review-rollover]')) {
    const today = localDateStr(new Date());
    loadTasks().filter((t) => !t.done && (!t.due || t.due <= today)).forEach((t) => snoozeTask(t.id));
    refreshOpenSection(); renderHome();
    return;
  }
  if (e.target.closest('[data-review-finish]')) {
    const noteEl = document.getElementById('reviewNote');
    finishReview(noteEl ? noteEl.value : '');
    renderStreak();
    refreshOpenSection();
    return;
  }
});

// Apple-Weather-style multicolour glyph for an Open-Meteo weather code.
function wxGlyph(code, isDay) {
  const cloud = '<g fill="#eef2f6"><circle cx="18" cy="20" r="7"/><circle cx="27" cy="17" r="9"/><circle cx="35" cy="20" r="6.5"/><rect x="17" y="19" width="19" height="8" rx="4"/></g>';
  const rain = '<g stroke="#5fb0ff" stroke-width="2.6" stroke-linecap="round"><line x1="20" y1="29" x2="18" y2="34"/><line x1="27" y1="29" x2="25" y2="34"/><line x1="34" y1="29" x2="32" y2="34"/></g>';
  const drizzle = '<g stroke="#5fb0ff" stroke-width="2.6" stroke-linecap="round"><line x1="23" y1="29" x2="22" y2="33"/><line x1="31" y1="29" x2="30" y2="33"/></g>';
  const sun = '<g><circle cx="24" cy="17" r="8" fill="#f7c044"/><g stroke="#f7c044" stroke-width="2.4" stroke-linecap="round"><line x1="24" y1="2" x2="24" y2="6"/><line x1="24" y1="28" x2="24" y2="32"/><line x1="9" y1="17" x2="5" y2="17"/><line x1="43" y1="17" x2="39" y2="17"/><line x1="13.5" y1="6.5" x2="10.5" y2="3.5"/><line x1="34.5" y1="6.5" x2="37.5" y2="3.5"/><line x1="13.5" y1="27.5" x2="10.5" y2="30.5"/><line x1="34.5" y1="27.5" x2="37.5" y2="30.5"/></g></g>';
  const moon = '<path d="M31 19a11 11 0 1 1-12-11 8.5 8.5 0 0 0 12 11z" fill="#f3e2a0"/>';
  const moonSm = '<circle cx="34" cy="11" r="6" fill="#f3e2a0"/>';
  const sunSm = '<circle cx="16" cy="13" r="6.5" fill="#f7c044"/>';
  const snow = '<g fill="#dbe6f0"><circle cx="20" cy="31" r="1.9"/><circle cx="27" cy="32" r="1.9"/><circle cx="34" cy="31" r="1.9"/></g>';
  const bolt = '<path d="M27 27l-5 8 5.5-1-2 6 7.5-10-5.5 1 3-4z" fill="#f7c044"/>';
  const w = (inner) => `<svg viewBox="0 0 48 36">${inner}</svg>`;
  if (code === 0) return w(isDay ? sun : moon);
  if (code === 1 || code === 2) return w((isDay ? sunSm : moonSm) + cloud);
  if (code === 3 || code === 45 || code === 48) return w(cloud);
  if (code >= 51 && code <= 57) return w((isDay ? '' : moonSm) + cloud + drizzle);
  if ((code >= 61 && code <= 67) || (code >= 80 && code <= 82)) return w((isDay ? '' : moonSm) + cloud + rain);
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return w(cloud + snow);
  if (code >= 95) return w(cloud + bolt);
  return w(cloud);
}

function renderWeatherCard() {
  const el = document.getElementById('weatherCard');
  if (!el) return;
  if (overview.weatherReached === false) { el.innerHTML = `<div class="nd-wx-loc">Weather</div><div class="nd-wx-msg">Tap to retry</div>`; return; }
  const raw = overview.weatherRaw;
  if (!raw) { el.innerHTML = `<div class="nd-wx-loc">Weather</div><div class="nd-wx-msg">Loading…</div>`; return; }
  const cur = raw.current, daily = raw.daily, hourly = raw.hourly;
  const [label] = describeWeather(cur.weather_code);
  const loc = (overview.locationLabel || 'Weather').replace(/\s*\(location unavailable\)/, '').split(',')[0];
  const hi = Math.round(daily.temperature_2m_max[0]);
  const lo = Math.round(daily.temperature_2m_min[0]);
  let hours = '';
  if (hourly && hourly.time) {
    let start = hourly.time.findIndex((t) => new Date(t).getTime() >= Date.now() - 3600000);
    if (start < 0) start = 0;
    const cells = [];
    for (let i = start; i < hourly.time.length && cells.length < 6; i++) {
      const d = new Date(hourly.time[i]);
      const hr = cells.length === 0 ? 'Now' : ((d.getHours() % 12) || 12) + (d.getHours() < 12 ? 'am' : 'pm');
      const t = Math.round(hourly.temperature_2m[i]);
      const day = d.getHours() >= 6 && d.getHours() < 19;
      cells.push(`<div class="nd-wx-hour"><span class="t">${hr}</span>${wxGlyph(hourly.weather_code[i], day)}<span class="v">${t}°</span></div>`);
    }
    hours = cells.join('');
  }
  const arrow = '<svg width="13" height="13" viewBox="0 0 24 24" fill="#fff"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>';
  el.innerHTML = `<div class="nd-wx-top">
      <div><div class="nd-wx-loc">${escapeHtml(loc)} ${arrow}</div><div class="nd-wx-temp">${Math.round(cur.temperature_2m)}°</div></div>
      <div class="nd-wx-right">${wxGlyph(cur.weather_code, cur.is_day !== 0)}<div class="nd-wx-cond">${escapeHtml(label)}</div><div class="nd-wx-hl">L:${lo}° H:${hi}°</div></div>
    </div>
    <div class="nd-wx-hours">${hours}</div>`;
}

// ---------- Readiness (Recovery, from Athlytic via the iOS Shortcut) ----------
const HEALTH_CACHE_KEY = 'morningDewHealth';
const RING_R = 82;
const RING_C = 2 * Math.PI * RING_R; // ~515.2

// One progress ring. pct 0–100; grad is a <linearGradient> id. Starts at 12
// o'clock and sweeps clockwise.
function ringSvg(pct, grad) {
  const p = Math.max(0, Math.min(100, Number(pct) || 0));
  const arc = (p / 100) * RING_C;
  return `<svg viewBox="0 0 200 200">
    <circle class="nd-rtrack" cx="100" cy="100" r="${RING_R}"/>
    <circle cx="100" cy="100" r="${RING_R}" fill="none" stroke="url(#${grad})" stroke-width="16" stroke-linecap="round"
      stroke-dasharray="${arc.toFixed(1)} ${RING_C.toFixed(1)}" transform="rotate(-90 100 100)"/>
  </svg>`;
}

function recoveryWord(r) {
  if (r >= 67) return 'Primed — a good day to push';
  if (r >= 34) return 'Moderate — pace yourself';
  return 'Low — take it easy today';
}
function sleepWord(s) {
  if (s >= 75) return 'Well rested';
  if (s >= 40) return 'Adequate sleep';
  return 'Short on sleep';
}
function strainWord(s) {
  if (s >= 67) return 'High exertion';
  if (s >= 34) return 'Moderate activity';
  return 'Light day';
}
// Today's recommended exertion ceiling/floor based on current recovery — same
// idea as Whoop's Strain Coach: a well-recovered body can absorb a harder day,
// a depleted one should stay light. A function of recovery alone (not today's
// strain itself) so it always answers "what should I do today", independent
// of what's already accumulated.
function targetStrainRange(rec) {
  if (rec == null) return null;
  const mid = 20 + (rec / 100) * 55; // 20 at recovery 0 .. 75 at recovery 100
  return { lo: Math.max(1, Math.round(mid - 12)), hi: Math.min(99, Math.round(mid + 12)) };
}
function targetStrainCompare(actual, t) {
  if (actual == null || !t) return 'Aim to land in this range today.';
  if (actual > t.hi) return `Today's strain is above target — you pushed harder than your recovery suggested.`;
  if (actual < t.lo) return `Today's strain is below target — there's room for more if you want it.`;
  return `Right in your target range — well matched to today's recovery.`;
}
// Diagonal-hatched arc spanning the target lo–hi zone, drawn at the SAME
// radius as the main ring and placed UNDER it (see detailRingHtml), so the
// solid progress arc naturally paints over the hatch wherever strain has
// already reached into the target band. Matches the Whoop/Athlytic Strain
// Coach ring: solid = achieved, hatch = the zone still worth reaching for.
function targetBandSvg(t) {
  if (!t) return '';
  const lo = Math.max(0, Math.min(100, t.lo));
  const hi = Math.max(0, Math.min(100, t.hi));
  const arcLen = ((hi - lo) / 100) * RING_C;
  const offset = -(lo / 100) * RING_C;
  return `<svg viewBox="0 0 200 200" style="position:absolute;inset:0;pointer-events:none">
    <circle cx="100" cy="100" r="${RING_R}" fill="none" stroke="url(#targetHatch)" stroke-width="16"
      stroke-dasharray="${arcLen.toFixed(1)} ${(RING_C - arcLen).toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
      transform="rotate(-90 100 100)"/>
  </svg>`;
}
// Small white tick marks at the target zone's lo/hi boundaries, drawn on top
// of everything so the zone's edges stay readable even where the solid arc
// or hatch underneath it changes.
function targetTicksSvg(t) {
  if (!t) return '';
  const tick = (pct) => {
    const a = (pct / 100) * 2 * Math.PI;
    const x1 = 100 + (RING_R - 10) * Math.sin(a);
    const y1 = 100 - (RING_R - 10) * Math.cos(a);
    const x2 = 100 + (RING_R + 10) * Math.sin(a);
    const y2 = 100 - (RING_R + 10) * Math.cos(a);
    return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>`;
  };
  return `<svg viewBox="0 0 200 200" style="position:absolute;inset:0;pointer-events:none">${tick(t.lo)}${tick(t.hi)}</svg>`;
}

// One mini progress ring for the home card's 3-up row. val null -> empty muted
// track with "–" so one missing/uncalibrated metric never blocks the others.
// Optional underlay/overlay mirror detailRingHtml's so the home Strain ring can
// show the same target-zone hatch/ticks as the detail screen, just smaller.
function miniRingHtml(val, grad, label, underlay = '', overlay = '') {
  const ring = val == null
    ? `<svg viewBox="0 0 200 200"><circle class="nd-rtrack" cx="100" cy="100" r="${RING_R}"/></svg><span class="mring-val empty">–</span>`
    : `${ringSvg(val, grad)}<span class="mring-val">${val}%</span>`;
  return `<div class="mring"><div class="mring-wrap">${underlay}${ring}${overlay}</div><span class="mring-label">${label}</span></div>`;
}
// Same as miniRingHtml but sized for the detail screen's larger .health-detail-rings grid.
// Optional underlay (e.g. targetBandSvg) renders absolutely-positioned BEHIND the ring so
// the solid progress arc paints over it; overlay (e.g. targetTicksSvg) renders on top.
function detailRingHtml(val, grad, label, underlay = '', overlay = '') {
  const ring = val == null
    ? `<svg viewBox="0 0 200 200"><circle class="nd-rtrack" cx="100" cy="100" r="${RING_R}"/></svg><span class="hring-val" style="color:var(--muted)">–</span>`
    : `${ringSvg(val, grad)}<span class="hring-val">${val}%</span>`;
  return `<div class="hring"><div class="hring-wrap">${underlay}${ring}${overlay}</div><span class="hring-label">${label}</span></div>`;
}

// On-device recovery history (date -> score) so the card and the brief can show a
// trend, even though the server only keeps the latest snapshot. Keyed by local
// date; today's value is overwritten with the latest, capped at 30 days.
const HEALTH_HIST_KEY = 'morningDewHealthHist';
function recordRecoveryHistory(rec) {
  if (rec == null || !Number.isFinite(Number(rec))) return;
  const hist = lsGet(HEALTH_HIST_KEY, {});
  hist[localDateStr(new Date())] = Math.round(Number(rec));
  for (const d of Object.keys(hist).sort().slice(0, -30)) delete hist[d];
  lsSet(HEALTH_HIST_KEY, hist);
}
function recoveryHistory() {
  const hist = lsGet(HEALTH_HIST_KEY, {});
  return Object.keys(hist).sort().reverse().map((d) => ({ date: d, score: hist[d] }));
}
function recoveryTrend() {
  const h = recoveryHistory();
  if (h.length < 2) return null;
  return { delta: h[0].score - h[1].score, previousScore: h[1].score, previousDate: h[1].date };
}
function trendChip(t) {
  if (!t || t.delta === 0) return '';
  return t.delta > 0 ? `▲${t.delta}` : `▼${Math.abs(t.delta)}`;
}

async function fetchHealth() {
  try {
    const res = await fetchWithTimeout(apiUrl('/api/health'));
    const data = await res.json();
    overview.healthConfigured = data.configured;
    if (data.data) { overview.health = data.data; lsSet(HEALTH_CACHE_KEY, data.data); recordRecoveryHistory(data.data.recovery); }
    else if (overview.health === undefined) overview.health = lsGet(HEALTH_CACHE_KEY, null);
  } catch {
    if (overview.health === undefined) overview.health = lsGet(HEALTH_CACHE_KEY, null);
    if (overview.healthConfigured === undefined) overview.healthConfigured = false;
  }
  renderHealth();
  if (healthOpen) renderHealthPage();
  fetchBrief();
}

function renderHealth() {
  const card = document.getElementById('healthCard');
  if (!card) return;
  const h = overview.health;
  const rec = h ? h.recovery : null;
  if (rec == null) {
    card.innerHTML = `<div class="nd-mini-rings">${miniRingHtml(null, 'gRecovery', 'Recovery')}${miniRingHtml(null, 'gSleep', 'Sleep')}${miniRingHtml(null, 'gStrain', 'Strain')}</div>`;
    return;
  }
  const target = targetStrainRange(rec);
  const strainRing = miniRingHtml(h.strain, 'gStrain', 'Strain', targetBandSvg(target), targetTicksSvg(target));
  card.innerHTML = `<div class="nd-mini-rings">${miniRingHtml(rec, 'gRecovery', 'Recovery')}${miniRingHtml(h.sleep, 'gSleep', 'Sleep')}${strainRing}</div>`;
}

let newsOpen = false;
let _newsCache = null;
let _newsCacheAt = 0;
async function fetchNews() {
  if (_newsCache && Date.now() - _newsCacheAt < 5 * 60 * 1000) return _newsCache;
  try {
    // Guardian Open Platform — CORS-enabled JSON API, public test key, no registration
    const url = 'https://content.guardianapis.com/search?show-fields=thumbnail,trailText&order-by=newest&page-size=20&api-key=test';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Guardian API ${res.status}`);
    const data = await res.json();
    const results = (data && data.response && data.response.results) || [];
    if (!results.length) throw new Error('no results');
    const articles = results.map(r => ({
      title: (r.webTitle || '').replace(/ \| .*$/, '').trim(),
      link: r.webUrl || '',
      description: ((r.fields && r.fields.trailText) || '').replace(/<[^>]+>/g, '').trim(),
      pubDate: r.webPublicationDate || '',
      thumbnail: (r.fields && r.fields.thumbnail) || '',
    }));
    _newsCache = { articles, source: 'The Guardian' };
    _newsCacheAt = Date.now();
    return _newsCache;
  } catch (err) {
    return { articles: [], error: String(err.message || err) };
  }
}
function newsTimeAgo(pubDate) {
  if (!pubDate) return '';
  const d = new Date(pubDate);
  if (isNaN(d.getTime())) return '';
  const mins = Math.round((Date.now() - d.getTime()) / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.round(hrs / 24)}d ago`;
}
function newsPageHtml(data) {
  const articles = (data && data.articles) || [];
  if (!articles.length) return `<div class="news-empty">${data && data.error ? escapeHtml('Could not load: ' + data.error) : 'No news available right now.'}</div>`;
  const src = escapeHtml((data && data.source) || 'News');
  const hero = articles[0];

  const h = overview.health;
  const rec = h ? h.recovery : null;
  const setBtn = `<section class="glass insight-card"><div class="brief-actions"><button class="brief-refresh" data-set-recovery>${rec == null ? "Enter today's recovery" : 'Update recovery'}</button></div></section>`;

  if (rec == null) {
    return `<section class="glass insight-card">
      <div class="health-empty"><b>No recovery data yet.</b><br><br>
        Tap below and enter today's Recovery % from Athlytic — saved on device, no setup needed.<br><br>
        <span style="opacity:0.7">Optional: a one-time iOS Shortcut can push it automatically each morning.</span>
      </div></section>${setBtn}`;
  }

  const sleep = h.sleep;
  const strain = h.strain;
  const t = recoveryTrend();
  const target = targetStrainRange(rec);

  const recColor = rec >= 67 ? 'var(--ok)' : rec >= 34 ? 'var(--bar-orange)' : 'var(--danger)';
  const trendStr = t && t.delta !== 0
    ? `${t.delta > 0 ? '↑' : '↓'} ${Math.abs(t.delta)} pts from ${t.previousScore} last reading`
    : t ? 'Holding steady' : '';
  const sourceStr = [h.source ? escapeHtml(h.source) : null, h.updatedAt ? `updated ${fmtAgo(new Date(h.updatedAt).getTime())}` : null].filter(Boolean).join(' · ');

  // Secondary metric chips (HRV, resting HR, sleep hours, active energy, exercise)
  const chipData = [];
  if (h.hrv != null) chipData.push({ val: `${Math.round(h.hrv)}ms`, lbl: 'HRV' });
  if (h.restingHeartRate != null) chipData.push({ val: Math.round(h.restingHeartRate), lbl: 'Resting HR' });
  if (h.sleepHours != null) chipData.push({ val: `${Math.round(h.sleepHours * 10) / 10}h`, lbl: 'Sleep' });
  if (h.activeEnergy != null) chipData.push({ val: `${Math.round(h.activeEnergy)} kcal`, lbl: 'Active' });
  if (h.exerciseMinutes != null) chipData.push({ val: `${Math.round(h.exerciseMinutes)} min`, lbl: 'Exercise' });
  const chipsHtml = chipData.length
    ? `<section class="glass insight-card"><div class="hd-chips">${chipData.map(({ val, lbl }) =>
        `<div class="hd-chip"><div class="hd-chip-val">${escapeHtml(String(val))}</div><div class="hd-chip-lbl">${escapeHtml(lbl)}</div></div>`
      ).join('')}</div></section>` : '';

  // 7-day trend chart with per-bar colour coding
  const hist = recoveryHistory().slice(0, 7).reverse();
  const chartHtml = hist.length >= 2
    ? `<section class="glass insight-card"><div class="hd-chart-hdr">7-Day Recovery</div>
        <div class="recov-chart">${hist.map((d) => {
          const lbl = new Date(d.date + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short' }).slice(0, 2);
          const fill = d.score >= 67 ? 'linear-gradient(#5fd39b,#34c98a)' : d.score >= 34 ? 'linear-gradient(#ffcc70,#ff9f43)' : 'linear-gradient(#ff9a9a,#ff6b6b)';
          return `<div class="col"><div class="bar"><div class="fill" style="height:${Math.max(4, d.score)}%;background:${fill}"></div></div><span class="d">${lbl}</span><span class="v">${d.score}</span></div>`;
        }).join('')}</div>
      </section>` : '';

  // Calibration / raw metric names (diagnostic footer)
  const rawNames = Array.isArray(h.rawMetricNames) && h.rawMetricNames.length ? h.rawMetricNames : null;
  const footerNote = [
    h.computed && chipData.length ? `Computed from ${chipData.map((c) => `${c.val} ${c.lbl}`).join(' · ')}` : null,
    h.calibrating ? 'Calibrating — sharpens as your baseline builds' : null,
    rawNames ? `Last sync: ${rawNames.map(escapeHtml).join(', ')}` : null,
  ].filter(Boolean);

  return `
    <section class="glass insight-card hd-hero">
      <div class="hd-hero-score" style="color:${recColor}">${rec}%</div>
      <div class="hd-hero-word">${escapeHtml(recoveryWord(rec))}</div>
      ${trendStr ? `<div class="hd-hero-trend">${escapeHtml(trendStr)}</div>` : ''}
      ${sourceStr ? `<div class="hd-hero-trend" style="margin-top:0.1rem;font-size:0.72rem">${sourceStr}</div>` : ''}
    </section>
    ${(sleep != null || strain != null) ? `<div class="hd-dual">
      ${sleep != null ? `<section class="glass insight-card hd-dual-card">
        <div class="hd-dual-val">${Math.round(sleep * 10) / 10}%</div>
        <div class="hd-dual-lbl">Sleep</div>
        <div class="hd-dual-word">${escapeHtml(sleepWord(sleep))}</div>
      </section>` : ''}
      ${strain != null ? `<section class="glass insight-card hd-dual-card">
        <div class="hd-dual-val" style="color:var(--bar-orange)">${strain}</div>
        <div class="hd-dual-lbl">Strain</div>
        <div class="hd-dual-word">${escapeHtml(strainWord(strain))}</div>
      </section>` : ''}
    </div>` : ''}
    ${chipsHtml}
    ${target ? `<section class="glass insight-card">
      <div class="hd-target-row">
        <div><div class="hd-chip-lbl">Target Strain</div><div class="hd-target-band">${target.lo}–${target.hi}</div></div>
        <div style="font-size:0.82rem;color:var(--muted);text-align:right;max-width:55%">${escapeHtml(targetStrainCompare(strain, target))}</div>
      </div>
    </section>` : ''}
    ${chartHtml}
    ${footerNote.length ? `<section class="glass insight-card"><div class="health-foot-note" style="opacity:0.65;font-size:0.76rem">${footerNote.map(escapeHtml).join('<br>')}</div></section>` : ''}
    ${setBtn}`;
}

// Manual entry — type today's recovery from Athlytic; saved on-device (no
// Shortcut / backend / token needed). The Shortcut path still overrides this
// automatically if it's ever set up.
function setRecoveryManual() {
  const cur = (overview.health && overview.health.recovery != null) ? String(overview.health.recovery) : '';
  const v = prompt("Today's Recovery % from Athlytic (0–100):", cur);
  if (v === null) return;
  const m = String(v).match(/-?\d+(?:\.\d+)?/);
  if (!m) { alert('Please enter a number from 0 to 100.'); return; }
  const rec = Math.max(0, Math.min(100, Math.round(Number(m[0]))));
  const data = Object.assign({}, overview.health, { recovery: rec, source: 'Manual', updatedAt: new Date().toISOString() });
  overview.health = data;
  lsSet(HEALTH_CACHE_KEY, data);
  recordRecoveryHistory(rec);
  if (overview.healthConfigured === undefined) overview.healthConfigured = true;
  renderHealth();
  if (healthOpen) renderHealthPage();
  fetchBrief(true);
}

// ---------- Refresh orchestration ----------
let lastUpdated = 0;

// Runs an /api loader and, if it failed (couldn't reach the backend — likely a
// Render cold start), retries once after a delay long enough to cover the wake.
function withColdStartRetry(loadFn, delayMs = 10000) {
  Promise.resolve(loadFn()).then((ok) => {
    if (ok === false) setTimeout(loadFn, delayMs);
  });
}

function fmtAgo(ts) {
  if (!ts) return '';
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 45) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  return `${h}h ago`;
}

function renderUpdated() {
  const el = document.getElementById('updatedLabel');
  if (!el) return;
  el.textContent = lastUpdated ? `Updated ${fmtAgo(lastUpdated)}` : 'Updating…';
}

function refreshAll() {
  lastUpdated = Date.now();
  renderUpdated();
  // Wake the backend a beat early so the /api calls land on a warm container.
  fetchWithTimeout(apiUrl('/')).catch(() => {});
  loadWeather();
  withColdStartRetry(loadCalendar);
  withColdStartRetry(loadReminders);
  withColdStartRetry(loadEmail);
  fetchHealth();
}

// ---------- Controls ----------
function openServerSetting() {
  const current = getApiBase();
  const next = prompt('Backend URL (e.g. https://morning-dew-backend.onrender.com)\nLeave blank to use this same site.', current);
  if (next === null) return;
  const trimmed = next.trim();
  if (trimmed) localStorage.setItem(API_BASE_KEY, trimmed);
  else localStorage.removeItem(API_BASE_KEY);
  updateServerBtnLabel();
  refreshAll();
}

document.getElementById('settingsBtn').addEventListener('click', openServerSetting);

// ---------- Detail-screen wiring ----------
document.addEventListener('click', (e) => {
  const trigger = e.target.closest('[data-detail]');
  if (trigger) {
    e.preventDefault();
    const type = trigger.getAttribute('data-detail');
    // The brief gets its own full-screen page (not a translucent sheet) — see Task 1.
    if (type === 'brief') openDebrief();
    else if (type === 'health') openHealth();
    else openDetail(type);
  }
});
// Route the back button and Escape through history so the pushed state is
// consumed (keeps the OS back gesture in sync via the popstate listener).
document.getElementById('detailBack').addEventListener('click', () => { if (currentDetail !== null) history.back(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && (currentDetail !== null || debriefOpen || healthOpen || newsOpen)) history.back(); });
// Pressing Return in the checklist input adds the reminder and keeps you typing.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target && e.target.id === 'taskInput') { e.preventDefault(); commitTaskInput(); }
});

document.getElementById('pageRefreshBtn').addEventListener('click', (e) => {
  e.currentTarget.classList.remove('spinning');
  // reflow so the animation restarts on every tap
  void e.currentTarget.offsetWidth;
  e.currentTarget.classList.add('spinning');
  refreshAll();
});

document.getElementById('navNews').addEventListener('click', () => openNews());
document.getElementById('newsBack').addEventListener('click', () => { if (newsOpen) history.back(); });
document.getElementById('navHealth').addEventListener('click', () => openHealth());
document.getElementById('healthBack').addEventListener('click', () => { if (healthOpen) history.back(); });
document.getElementById('healthPage').addEventListener('click', (e) => {
  const tab = e.target.closest('[data-hp-tab]');
  if (tab && !tab.closest('[data-hp-tab-goto]')) { hpSwitchTab(parseInt(tab.getAttribute('data-hp-tab'))); return; }
  const goto = e.target.closest('[data-hp-tab-goto]');
  if (goto) { hpSwitchTab(parseInt(goto.getAttribute('data-hp-tab-goto'))); return; }
});
document.getElementById('navInbox').addEventListener('click', () => openDetail('inbox'));

// ---------- Pull to refresh ----------
(function setupPullToRefresh() {
  const spinner = document.getElementById('ptrSpinner');
  const THRESHOLD = 70;
  let startY = 0;
  let pulling = false;
  window.addEventListener('touchstart', (e) => {
    if (!currentDetail && !debriefOpen && window.scrollY <= 0 && e.touches.length === 1) {
      startY = e.touches[0].clientY;
      pulling = true;
    } else {
      pulling = false;
    }
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && window.scrollY <= 0) {
      const pct = Math.min(1, dy / THRESHOLD);
      spinner.style.opacity = String(pct);
      spinner.style.transform = `translate(-50%, ${Math.min(dy / 2, 40) - 10}px)`;
    }
  }, { passive: true });
  window.addEventListener('touchend', (e) => {
    if (!pulling) return;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > THRESHOLD && window.scrollY <= 0) {
      spinner.classList.add('active');
      spinner.style.opacity = '1';
      refreshAll();
      setTimeout(() => {
        spinner.classList.remove('active');
        spinner.style.opacity = '0';
        spinner.style.transform = 'translate(-50%, -10px)';
      }, 1200);
    } else {
      spinner.style.opacity = '0';
      spinner.style.transform = 'translate(-50%, -10px)';
    }
    pulling = false;
  }, { passive: true });
})();

// ---------- Debrief page: edge swipe-back gesture ----------
// Isolated from pull-to-refresh above (which gates on !debriefOpen and
// vertical scroll) so the two gestures never compete on the same touch.
(function setupDebriefSwipeBack() {
  const EDGE = 24, THRESHOLD = 80, MAX_DRIFT = 60;
  let startX = 0, startY = 0, tracking = false;
  window.addEventListener('touchstart', (e) => {
    if (debriefOpen && e.touches.length === 1 && e.touches[0].clientX <= EDGE) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      tracking = true;
    } else {
      tracking = false;
    }
  }, { passive: true });
  window.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx > THRESHOLD && dy < MAX_DRIFT) history.back();
  }, { passive: true });
})();

// ---------- Refresh on open / focus ----------
// Re-fetch when the installed PWA is brought back to the foreground after being
// idle, so it's fresh the moment it's opened each morning without a manual tap.
const STALE_MS = 5 * 60 * 1000;
function maybeRefreshOnVisible() {
  if (document.visibilityState === 'visible' && Date.now() - lastUpdated > STALE_MS) {
    refreshAll();
  }
}
document.addEventListener('visibilitychange', maybeRefreshOnVisible);
window.addEventListener('pageshow', maybeRefreshOnVisible);

// ---------- Boot ----------
renderGreeting();
applyTheme(); // hour-based theme immediately; weather refines it with is_day
// Seed a cached brief (if today's is stored) so the hero card is instant.
const seededBrief = cachedBrief();
if (seededBrief) { overview.brief = seededBrief.brief; overview.briefStructured = seededBrief.structured; }
renderStreak();
renderOverview();
refreshAll();
// Deep-link support: opening/reloading directly on #/debrief lands on the
// full-screen page instead of the home dashboard.
if (location.hash === '#/debrief') openDebrief();
setInterval(renderUpdated, 30000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
