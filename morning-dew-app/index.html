<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Morning Dew</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1c130c" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Morning Dew" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<style>
  :root {
    --text: #f3ead9;
    --muted: rgba(243, 234, 217, 0.58);
    --glass-bg: rgba(58, 42, 31, 0.46);
    --glass-bg-soft: rgba(58, 42, 31, 0.30);
    --glass-border: rgba(255, 234, 205, 0.16);
    --glass-highlight: rgba(255, 226, 188, 0.30);
    --accent: #ffb22e;
    --danger: #ff6b6b;
    --ok: #34e0c4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overflow-x: hidden;
  }
  body {
    position: relative;
    background: linear-gradient(168deg, #2a1d13 0%, #1c130c 55%, #130d08 100%);
    background-attachment: fixed;
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(env(safe-area-inset-top) + 1.2rem) 1.1rem calc(env(safe-area-inset-bottom) + 1rem);
    gap: 0;
  }
  main.home { width: 100%; max-width: 460px; }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(64px);
    opacity: 0.5;
    z-index: 0;
    will-change: transform;
  }
  .blob-a {
    width: 65vw; height: 65vw;
    top: -18vw; left: -15vw;
    background: radial-gradient(circle, #ff9d3c, transparent 70%);
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .blob-b {
    width: 70vw; height: 70vw;
    bottom: -28vw; right: -25vw;
    background: radial-gradient(circle, #d9762a, transparent 70%);
    opacity: 0.4;
    animation: drift2 26s ease-in-out infinite alternate;
  }
  .blob-c {
    width: 48vw; height: 48vw;
    top: 32vh; right: -18vw;
    background: radial-gradient(circle, #ffc24d, transparent 70%);
    opacity: 0.28;
    animation: drift3 30s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(6vw, 8vh); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-8vw, -6vh); } }
  @keyframes drift3 { from { transform: translate(0,0); } to { transform: translate(-5vw, 5vh); } }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
  }

  .greeting-block { padding: 0 0.25rem; }
  .greeting-date {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .greeting-phrase {
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .greeting-name {
    font-size: 2.5rem;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.01em;
    background: linear-gradient(120deg, #ffffff, #cfe0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .updated-label {
    color: var(--muted); font-size: 0.74rem; font-weight: 600;
    margin-top: 0.45rem; opacity: 0.75;
  }

  .glass {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 26px;
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    overflow: hidden;
  }
  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glass-highlight), transparent 45%);
    opacity: 0.22;
    pointer-events: none;
  }

  /* ---- Card colour variants (locally re-scope text vars so children adapt) ---- */
  .card-cream {
    background: #efe5d4;
    --text: #33241a; --muted: rgba(51,36,26,0.62); --glass-border: rgba(0,0,0,0.08);
    color: var(--text);
  }
  .card-amber {
    background: linear-gradient(150deg, #ffc24d 0%, #f5a623 100%);
    --text: #3a2710; --muted: rgba(58,39,16,0.66); --glass-border: rgba(0,0,0,0.10);
    color: var(--text);
  }
  .card-tan {
    background: #d9bfa6;
    --text: #3a2a1c; --muted: rgba(58,42,28,0.62); --glass-border: rgba(0,0,0,0.08);
    color: var(--text);
  }
  .card-dark { background: rgba(28,20,14,0.62); }
  .card-cream::before, .card-amber::before, .card-tan::before { opacity: 0; }

  /* ---- Welcome header ---- */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 0.25rem; }
  .brand { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.01em; color: var(--accent); }
  .brand small { display: block; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-top: -0.1rem; }
  .welcome { padding: 0 0.25rem; }
  .welcome-hi { font-size: 1.15rem; font-weight: 600; color: var(--muted); }
  .welcome-name {
    margin: 0.1rem 0 0; font-size: 2.7rem; font-weight: 800; line-height: 1.02; letter-spacing: -0.02em;
    background: linear-gradient(110deg, #fff5e6, var(--accent)); -webkit-background-clip: text;
    background-clip: text; color: transparent;
  }
  .welcome-date { color: var(--muted); font-size: 0.86rem; font-weight: 600; margin-top: 0.5rem; }

  /* ---- Bento grid ---- */
  .bento {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 0.7rem; align-items: start;
  }
  .bento > * { min-width: 0; }
  .span2 { grid-column: span 2; }
  .bento-card { padding: 1rem 1.05rem; }
  .bento-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 0.6rem; letter-spacing: -0.01em; }
  .bento-head { display: flex; align-items: center; gap: 0.5rem; }
  .bento-head .bento-title { margin-bottom: 0; margin-right: auto; }

  /* Stat tiles */
  .stat-tile { padding: 0.8rem 0.9rem; }

  /* ---- Single-screen launcher home ---- */
  main.home {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; gap: 0.85rem;
  }
  .home-tiles {
    min-height: 46vh;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0.7rem;
  }
  .home-tile {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between;
    gap: 0.15rem; padding: 1rem; min-height: 0; overflow: hidden;
    text-align: left; cursor: pointer;
    transition: transform 0.12s ease;
  }
  .home-tile:active { transform: scale(0.97); }

  /* ---- Readiness (Apple Watch / Bevel) ---- */
  .health-card { padding: 1rem 1.1rem 1.1rem; text-align: left; cursor: pointer; transition: transform 0.12s ease; }
  .health-card:active { transform: scale(0.99); }
  .health-card-head { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.7rem; }
  .health-card-title { font-size: 0.95rem; font-weight: 800; letter-spacing: -0.01em; }
  .health-card-meta { font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-left: auto; }
  .health-rings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
  .hring { display: flex; flex-direction: column; align-items: center; gap: 0.45rem; }
  .hring-wrap { position: relative; width: 5.4rem; height: 5.4rem; }
  .hring-wrap svg { width: 100%; height: 100%; display: block; }
  .hring-val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
  .hring-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); }
  .rtrack { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 16; }
  .health-empty { color: var(--muted); font-size: 0.86rem; line-height: 1.4; padding: 0.3rem 0.1rem; }
  .health-empty b { color: var(--text); font-weight: 700; }
  /* Detail-section rings (larger) */
  .health-detail-rings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin: 0.4rem 0 1.2rem; }
  .health-detail-rings .hring-wrap { width: 6.6rem; height: 6.6rem; }
  .health-detail-rings .hring-val { font-size: 1.55rem; }
  .health-foot-note { color: var(--muted); font-size: 0.82rem; line-height: 1.45; }
  .tile-icon { font-size: 1.7rem; line-height: 1; }
  .tile-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
  .tile-value { font-size: 1.55rem; font-weight: 800; line-height: 1.05; letter-spacing: -0.01em; }
  .tile-sub { font-size: 0.78rem; color: var(--muted); max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Schedule pills (cream card) */
  .sched-item {
    display: flex; flex-direction: column; gap: 0.1rem;
    background: #2a1c12; color: #f3ead9;
    border-radius: 16px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem;
    text-decoration: none;
  }
  .sched-item:last-child { margin-bottom: 0; }
  .sched-item:nth-child(even) { background: #d9b08a; color: #33241a; }
  .sched-item:active { filter: brightness(1.08); }
  .sched-time { font-size: 0.72rem; font-weight: 700; opacity: 0.85; }
  .sched-title { font-size: 0.95rem; font-weight: 700; }

  /* Task checklist (cream card) */
  .task-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.4rem 0; }
  .task-box {
    flex-shrink: 0; width: 18px; height: 18px; border-radius: 6px;
    border: 2px solid rgba(51,36,26,0.4);
  }
  .task-title { font-size: 0.95rem; font-weight: 600; }
  .task-title .task-time { color: var(--muted); font-weight: 600; font-size: 0.82rem; margin-left: 0.3rem; }

  .section-title {
    position: relative;
    z-index: 1;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    padding: 0 0.25rem;
    margin-top: 0.2rem;
  }
  .section-title-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.2rem;
  }
  .section-title-row .section-title { margin-top: 0; margin-right: auto; }
  .icon-link {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1.7rem;
    height: 1.7rem;
    border-radius: 8px;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    font-size: 1rem;
    line-height: 1;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .icon-link:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.16); }

  /* ---- weather ---- */
  .weather-card { padding: 1.5rem 1.4rem; text-align: center; }
  .weather-icon { font-size: 3.6rem; line-height: 1; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35)); }
  .temp { font-size: 3.8rem; font-weight: 700; margin: 0.1rem 0; letter-spacing: -0.02em; }
  .desc { font-size: 1.05rem; font-weight: 600; }
  .location { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }
  .stats-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .stat-card { padding: 0.85rem 1rem; text-align: left; }
  .stat-label { color: var(--muted); font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
  .stat-value { font-size: 1.25rem; font-weight: 700; margin-top: 0.15rem; }

  /* ---- 7-day forecast ---- */
  .forecast-card { padding: 0.5rem 1.1rem; }
  .forecast-row {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .forecast-row:last-child { border-bottom: none; }
  .fc-day { width: 2.6rem; font-weight: 600; font-size: 0.92rem; }
  .fc-icon { width: 1.9rem; text-align: center; font-size: 1.3rem; }
  .fc-rain {
    width: 3.1rem; font-size: 0.8rem; font-weight: 600;
    color: #5fb0ff; text-align: right; white-space: nowrap;
  }
  .fc-rain.dry { color: var(--muted); opacity: 0.5; }
  .fc-temps { flex: 1; display: flex; align-items: center; gap: 0.5rem; }
  .fc-lo { color: var(--muted); font-size: 0.9rem; width: 1.9rem; text-align: right; }
  .fc-hi { font-weight: 700; font-size: 0.95rem; width: 1.9rem; }
  .fc-track {
    flex: 1; height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.12); overflow: hidden; position: relative;
  }
  .fc-fill {
    position: absolute; top: 0; height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #4aa3ff, #ff8a3a);
  }

  /* ---- generic list cards (calendar / reminders / email) ---- */
  .list-card { padding: 1rem 1.1rem; }
  .list-row {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    padding: 0.65rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.10);
  }
  .list-row:last-child { border-bottom: none; }
  .list-row-title { font-weight: 600; font-size: 0.95rem; }
  .list-row-meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.15rem; }
  .empty-state, .error-state, .placeholder-state {
    position: relative; z-index: 1;
    color: var(--muted); font-size: 0.88rem; padding: 0.4rem 0.1rem; line-height: 1.4;
  }
  .error-state { color: var(--danger); }
  .placeholder-state code {
    background: rgba(255,255,255,0.10); padding: 0.1rem 0.35rem; border-radius: 6px; font-size: 0.78rem;
  }
  .loading-state {
    position: relative; z-index: 1;
    color: var(--muted); font-size: 0.88rem; padding: 0.4rem 0.1rem;
  }
  .tag {
    display: inline-block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; padding: 0.12rem 0.45rem; border-radius: 8px; margin-bottom: 0.3rem;
  }
  .tag-urgent { background: rgba(255, 107, 107, 0.18); color: var(--danger); }
  .tag-new { background: rgba(52, 224, 196, 0.18); color: var(--ok); }

  /* ---- Outlook-style email list ---- */
  .mail-card { padding: 0.4rem 0.6rem; }
  .mail-scroll {
    position: relative; z-index: 1;
    max-height: 320px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .mail-row {
    display: flex; align-items: flex-start; gap: 0.7rem;
    padding: 0.7rem 0.45rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-decoration: none; color: var(--text);
    transition: background 0.12s ease;
  }
  .mail-row:last-child { border-bottom: none; }
  .mail-row:active { background: rgba(255,255,255,0.08); }
  .mail-avatar {
    flex-shrink: 0;
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.95rem; font-weight: 700; color: #fff;
    margin-top: 0.1rem;
  }
  .mail-body { display: flex; flex-direction: column; flex: 1; min-width: 0; }
  .mail-top {
    display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem;
  }
  .mail-sender {
    font-weight: 700; font-size: 0.95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mail-date { flex-shrink: 0; color: var(--muted); font-size: 0.78rem; }
  .mail-subject {
    font-size: 0.9rem; margin-top: 0.05rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mail-snippet {
    color: var(--muted); font-size: 0.82rem; line-height: 1.3; margin-top: 0.1rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .mail-unread-dot {
    flex-shrink: 0; width: 8px; height: 8px; border-radius: 50%;
    background: #3a8dff; margin: 0.5rem 0 0 -0.2rem;
  }

  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
  }
  .refresh-btn {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 0.9rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    border-radius: 22px;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .refresh-btn:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.16); }

  /* Floating page-reload button, pinned top-right above everything */
  .page-refresh-btn {
    position: fixed;
    z-index: 5;
    top: calc(env(safe-area-inset-top) + 0.75rem);
    right: calc(env(safe-area-inset-right) + 0.9rem);
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    color: var(--text);
    border-radius: 50%;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    transition: transform 0.2s ease, background 0.15s ease;
  }
  .page-refresh-btn:active { background: rgba(255, 255, 255, 0.16); }
  .page-refresh-btn.spinning { animation: spin360 0.6s ease; }
  @keyframes spin360 { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  /* Settings gear, pinned just left of the refresh button */
  .page-settings-btn {
    position: fixed;
    z-index: 5;
    top: calc(env(safe-area-inset-top) + 0.75rem);
    right: calc(env(safe-area-inset-right) + 0.9rem + 52px);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; color: var(--text);
    border-radius: 50%;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    transition: background 0.15s ease;
  }
  .page-settings-btn:active { background: rgba(255, 255, 255, 0.16); }

  /* Pull-to-refresh spinner */
  .ptr-spinner {
    position: fixed; z-index: 4;
    top: calc(env(safe-area-inset-top) + 0.4rem);
    left: 50%;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; color: var(--text);
    border-radius: 50%;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    opacity: 0; transform: translate(-50%, -10px);
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .ptr-spinner.active { animation: spin360 0.8s linear infinite; }

  /* ---- Hourly strip ---- */
  .hourly-card { padding: 0.6rem 0.4rem; }
  .hourly-strip {
    position: relative; z-index: 1;
    display: flex; gap: 0.2rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .hourly-strip::-webkit-scrollbar { display: none; }
  .hour-cell {
    flex: 0 0 auto; width: 3.5rem;
    display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
    padding: 0.4rem 0;
  }
  .hc-time { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
  .hc-icon { font-size: 1.25rem; }
  .hc-temp { font-size: 0.95rem; font-weight: 700; }
  .hc-rain { font-size: 0.68rem; color: #5fb0ff; font-weight: 600; min-height: 0.9rem; }

  /* ---- Weather card extras ---- */
  .weather-hilo { font-size: 0.95rem; font-weight: 600; margin-top: 0.35rem; }
  .weather-hilo .hi { color: var(--text); }
  .weather-hilo .lo { color: var(--muted); }
  .weather-sun { color: var(--muted); font-size: 0.82rem; margin-top: 0.25rem; }

  /* ---- Today timeline ---- */
  .timeline-row {
    position: relative; z-index: 1;
    display: flex; align-items: flex-start; gap: 0.65rem;
    padding: 0.6rem 0.1rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-decoration: none; color: var(--text);
  }
  .timeline-row:last-child { border-bottom: none; }
  a.timeline-row:active { background: rgba(255,255,255,0.08); }
  .tl-icon { flex-shrink: 0; font-size: 1.1rem; width: 1.5rem; text-align: center; }

<script>
const BRISBANE = { latitude: -27.4698, longitude: 153.0251 };
const FETCH_TIMEOUT_MS = 8000;

// Calendar/reminders/email need the Bun backend, which can't run on GitHub
// Pages — when this frontend is hosted there, the backend lives on a
// different origin (e.g. Render), so /api/* calls need an absolute URL
// instead of a same-origin relative one. Persisted in localStorage so it
// survives reloads and re-installs of the PWA; empty string means
// "same origin as this page" (true when self-hosting the whole app via
// `bun run server`, where index.html and /api/* are served from one place).
const API_BASE_KEY = 'morningDewApiBase';
function getApiBase() {
  return (localStorage.getItem(API_BASE_KEY) || '').replace(/\/$/, '');
}
function apiUrl(path) {
  return getApiBase() + path;
}
// The backend URL now lives behind the ⚙ gear (see openServerSetting); this
// reflects the current value into the gear's tooltip/aria-label for at-a-glance
// confirmation of which server the app is pointed at.
function updateServerBtnLabel() {
  const base = getApiBase();
  const btn = document.getElementById('settingsBtn');
  if (!btn) return;
  const label = base ? `Server: ${base.replace(/^https?:\/\//, '')}` : 'Server: not set';
  btn.title = label;
  btn.setAttribute('aria-label', label);
}
updateServerBtnLabel();

// ---------- AI overview ----------
// Pure client-side aggregation over data the other cards already fetched —
// no extra network calls, just a different view onto the same weather/
// calendar/reminders/email state. Each load*() function below updates its
// slice and calls renderOverview(); whichever finishes last produces the
// freshest combined summary, and any slice that's still loading or failed
// is simply omitted rather than blocking the others.
const overview = { weather: null, calendar: null, reminders: null, email: null };

function isToday(iso) {
  const d = new Date(iso);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

// ---------- Local stores (single-user, on-device): tasks, review, streak ----------
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function lsGet(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch { /* quota */ } }

const TASKS_KEY = 'morningDewTasks';
function loadTasks() { return lsGet(TASKS_KEY, []); }
function saveTasks(t) { lsSet(TASKS_KEY, t); }
function addTask(title) {
  const t = loadTasks();
  t.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title: title.trim(), done: false, due: localDateStr(new Date()), createdAt: Date.now() });
  saveTasks(t);
}
function mutateTask(id, fn) { const t = loadTasks(); const x = t.find((i) => i.id === id); if (x) fn(x, t); saveTasks(t); }
function toggleTask(id) { mutateTask(id, (x) => { x.done = !x.done; x.doneAt = x.done ? Date.now() : null; }); }
function snoozeTask(id) {
  mutateTask(id, (x) => { const d = new Date(); d.setDate(d.getDate() + 1); x.due = localDateStr(d); });
}
function deleteTask(id) { saveTasks(loadTasks().filter((t) => t.id !== id)); }
// App tasks that belong on today's list: not done, due today or overdue.
function appTasksForToday() {
  const today = localDateStr(new Date());
  return loadTasks().filter((t) => !t.done && (!t.due || t.due <= today));
}

const REVIEW_KEY = 'morningDewReview';
const STREAK_KEY = 'morningDewStreak';
function isReviewedToday() { const r = lsGet(REVIEW_KEY, {}); return !!r[localDateStr(new Date())]; }
function finishReview(note) {
  const today = localDateStr(new Date());
  const r = lsGet(REVIEW_KEY, {}); r[today] = { reviewed: true, note: note || '', at: Date.now() }; lsSet(REVIEW_KEY, r);
  // Streak: +1 if last review was yesterday, reset to 1 on a gap, no-op if already today.
  const s = lsGet(STREAK_KEY, { count: 0, lastDate: null });
  const y = new Date(); y.setDate(y.getDate() - 1);
  if (s.lastDate === today) { /* already counted */ }
  else if (s.lastDate === localDateStr(y)) { s.count += 1; s.lastDate = today; }
  else { s.count = 1; s.lastDate = today; }
  lsSet(STREAK_KEY, s);
}
function currentStreak() {
  const s = lsGet(STREAK_KEY, { count: 0, lastDate: null });
  if (!s.lastDate || !s.count) return 0;
  const today = localDateStr(new Date());
  const y = new Date(); y.setDate(y.getDate() - 1);
  // Streak only "counts" if kept up to yesterday/today; otherwise it's lapsed.
  return (s.lastDate === today || s.lastDate === localDateStr(y)) ? s.count : 0;
}

function fmtClock(iso) {
  return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function fmtDuration(ms) {
  const mins = Math.round(ms / 60000);
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// Finds the largest open gap between now and the end of the day, given
// today's (sorted, non-all-day) events — used to answer "when am I free?"
// rather than just listing what's busy.
function findFreeBlock(todaysEvents) {
  const now = new Date();
  const dayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 0, 0);
  const busy = todaysEvents
    .filter((ev) => !ev.allDay)
    .map((ev) => ({ start: new Date(ev.start), end: ev.end ? new Date(ev.end) : new Date(new Date(ev.start).getTime() + 30 * 60000) }))
    .filter((ev) => ev.end > now)
    .sort((a, b) => a.start - b.start);

  let cursor = now;
  let best = null;
  for (const ev of busy) {
    const gapStart = cursor;
    const gapEnd = ev.start > cursor ? ev.start : cursor;
    if (gapEnd > gapStart) {
      const gapMs = gapEnd - gapStart;
      if (!best || gapMs > best.ms) best = { start: gapStart, end: gapEnd, ms: gapMs };
    }
    if (ev.end > cursor) cursor = ev.end;
  }
  if (cursor < dayEnd) {
    const gapMs = dayEnd - cursor;
    if (!best || gapMs > best.ms) best = { start: cursor, end: dayEnd, ms: gapMs };
  }
  return best;
}

function renderGlance() {
  const card = document.getElementById('overviewCard');
  const lines = [];

  if (overview.weather) {
    const { label, temp, precip, fallback, nudges } = overview.weather;
    lines.push(`<div class="overview-line"><span class="icon">🌡️</span><span>${temp}° and ${label.toLowerCase()}, ${precip}% chance of rain${fallback ? ' (showing Brisbane — location unavailable)' : ''}.</span></div>`);
    (nudges || []).forEach((n) => {
      lines.push(`<div class="overview-line"><span class="icon">${n.icon}</span><span>${escapeHtml(n.text)}</span></div>`);
    });
  }

  if (overview.calendar) {
    const todays = overview.calendar.filter((ev) => isToday(ev.start)).sort((a, b) => new Date(a.start) - new Date(b.start));
    const now = new Date();
    const upcoming = todays.filter((ev) => ev.allDay || new Date(ev.end || ev.start) > now);
    if (!todays.length) {
      lines.push(`<div class="overview-line"><span class="icon">📅</span><span>Nothing on the calendar today.</span></div>`);
    } else if (!upcoming.length) {
      lines.push(`<div class="overview-line"><span class="icon">📅</span><span>${todays.length} event${todays.length > 1 ? 's' : ''} today, all done.</span></div>`);
    } else {
      const next = upcoming[0];
      lines.push(`<div class="overview-line"><span class="icon">📅</span><span>${todays.length} event${todays.length > 1 ? 's' : ''} today — next: ${next.summary}${next.allDay ? ' (all day)' : ' at ' + fmtClock(next.start)}.</span></div>`);
    }
    const free = findFreeBlock(todays);
    if (free && free.ms >= 15 * 60000) {
      lines.push(`<div class="overview-line"><span class="icon">🕒</span><span>Free for ${fmtDuration(free.ms)}, until ${fmtClock(free.end)}.</span></div>`);
    }
  }

  if (overview.reminders) {
    const dueToday = overview.reminders.filter((ev) => isToday(ev.start)).length;
    if (dueToday) {
      lines.push(`<div class="overview-line"><span class="icon">✅</span><span>${dueToday} reminder${dueToday > 1 ? 's' : ''} due today.</span></div>`);
    }
  }

  if (overview.email) {
    const { urgent } = overview.email;
    if (urgent > 0) {
      lines.push(`<div class="overview-line"><span class="icon">✉️</span><span>${urgent} urgent email${urgent > 1 ? 's' : ''} waiting.</span></div>`);
    }
  }

  if (!lines.length) {
    card.innerHTML = `<div class="overview-label">Today at a glance</div><div class="overview-line"><span class="icon">⏳</span><span>Building your overview...</span></div>`;

const BRIEF_KEY = 'morningDewBrief';
function cachedBrief() {
  const b = lsGet(BRIEF_KEY, null);
  return b && b.date === localDateStr(new Date()) ? b.brief : null;
}
function briefHeadline(md) {
  if (!md) return '';
  const h = md.split('\n').find((l) => l.startsWith('## '));
  return (h ? h.slice(3) : md.split('\n').find((l) => l.trim())).replace(/\*\*/g, '').trim();
}
// Tiny markdown → HTML for the brief (## heading, **bold**, - bullets).
function mdToHtml(md) {
  const lines = escapeHtml(md).split('\n');
  let html = '';
  let inList = false;
  for (const raw of lines) {
    const line = raw.trim();
    const bold = (s) => s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
    if (line.startsWith('## ')) { if (inList) { html += '</ul>'; inList = false; } html += `<h2 class="brief-h">${bold(line.slice(3))}</h2>`; }
    else if (line.startsWith('- ')) { if (!inList) { html += '<ul class="brief-ul">'; inList = true; } html += `<li>${bold(line.slice(2))}</li>`; }
    else if (!line) { if (inList) { html += '</ul>'; inList = false; } }
    else { if (inList) { html += '</ul>'; inList = false; } html += `<p class="brief-p">${bold(line)}</p>`; }
  }
  if (inList) html += '</ul>';
  return html;
}
function briefContext() {
  const evs = todaysEvents().map((e) => ({ title: e.summary, start: e.start, end: e.end, allDay: e.allDay, location: e.location }));
  const tasks = [
    ...appTasksForToday().map((t) => ({ title: t.title, source: 'task' })),

  } : null;
  const email = overview.emailData ? {

    urgentSubjects: overview.emailData.urgent.slice(0, 5).map((m) => m.subject),
  } : null;
  const now = new Date();
  return { localTime: fmtClock(now.toISOString()), date: now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }), location: overview.locationLabel || null, events: evs, tasks, weather: w, email };
}
async function fetchBrief(force) {
  if (!force) {
    const c = cachedBrief();
    if (c) { overview.brief = c; renderOverview(); return; }
  }
  if (overview.briefFetching) return;
  // Wait until the core data is in so the brief is built from a full picture.
  if (overview.weatherReached === undefined || overview.calendarReached === undefined) return;
  overview.briefFetching = true;
  if (currentDetail === 'brief') openDetail('brief');
  try {
    const res = await fetchWithTimeout(apiUrl('/api/brief'), {
      method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(briefContext()),
    }, 28000);
    const data = await res.json();
    if (data.configured === false) { overview.briefConfigured = false; }
    else if (data.brief) {
      overview.brief = data.brief;
      overview.briefConfigured = true;

    } else if (data.error) {
      overview.briefError = data.error;

  } finally {
    overview.briefFetching = false;

}

// ---------- Push notifications (morning brief at ~7am) ----------
const PUSH_KEY = 'morningDewPush';
function pushSupported() { return 'serviceWorker' in navigator && 'PushManager' in window; }
function pushEnabled() { return localStorage.getItem(PUSH_KEY) === 'on'; }
function pushButtonHtml() {
  if (!pushSupported()) return `<div class="push-status">🔔 Add to your Home Screen to enable morning alerts</div>`;
  return pushEnabled()
    ? `<div class="push-status">🔔 Morning notifications on</div>`
    : `<button class="brief-refresh" data-enable-push>🔔 Get this brief at 7am</button>`;
}
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - (b64.length % 4)) % 4);
  const base = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base);
  return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}
async function enablePush() {
  if (!pushSupported()) { alert('Notifications need the installed app. Add Morning Dew to your Home Screen first, then try again.'); return; }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { alert('Notifications were not allowed. You can enable them in Settings.'); return; }
    const cfg = await (await fetchWithTimeout(apiUrl('/api/push/config'))).json();
    if (!cfg.configured || !cfg.publicKey) { alert('Push is not set up on the server yet (VAPID keys + Upstash).'); return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(cfg.publicKey) });
    const res = await fetchWithTimeout(apiUrl('/api/push/subscribe'), { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(sub) });
    if (!res.ok) throw new Error('server rejected the subscription');
    localStorage.setItem(PUSH_KEY, 'on');
    refreshOpenSection();
    alert('Morning brief notifications enabled. You will get a nudge around 7am.');
  } catch (err) {
    alert('Could not enable notifications: ' + (err.message || err));
  }
}

async function fetchWithTimeout(url, opts = {}, ms = FETCH_TIMEOUT_MS) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    return await fetch(url, { ...opts, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

// ---------- Weather ----------
// Live location, with a hard-capped wait. The original "Fetching weather..."
// hang was navigator.geolocation.getCurrentPosition never resolving when the
// permission prompt was dismissed/ignored/previously-denied — no timeout was
// ever set on it. Fixed by racing it against a manual timer in addition to
// the API's own (unreliable on iOS) `timeout` option, and falling back to
// Brisbane (the original fixed location) if geolocation fails or times out,
// so the weather card never hangs no matter what the user does with the
// permission prompt.
const GEO_TIMEOUT_MS = 8000;

function getCurrentPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('geolocation unsupported'));
      return;
    }
    const timer = setTimeout(() => reject(new Error('geolocation timed out')), GEO_TIMEOUT_MS);
    navigator.geolocation.getCurrentPosition(
      (pos) => { clearTimeout(timer); resolve(pos); },
      (err) => { clearTimeout(timer); reject(err); },
      { enableHighAccuracy: false, timeout: GEO_TIMEOUT_MS, maximumAge: 5 * 60 * 1000 }
    );
  });
}

// Best-effort, no API key — BigDataCloud's free reverse-geocode endpoint is
// CORS-enabled and keyless. Never blocks weather: failure just leaves the
// generic "Current location" label in place.
async function updateLocationLabel(latitude, longitude) {
  try {
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`;
    const res = await fetchWithTimeout(url);
    if (!res.ok) return;
    const data = await res.json();
    const place = data.locality || data.city || data.principalSubdivision;
    if (place) {
      overview.locationLabel = data.principalSubdivision && place !== data.principalSubdivision
        ? `${place}, ${data.principalSubdivision}`
        : place;
      renderHome();
      if (currentDetail === 'weather') openDetail('weather');
    }
  } catch {
    // Best-effort only — coordinates-based weather already loaded fine.
  }
}

async function loadWeather() {
  let { latitude, longitude } = BRISBANE;
  overview.locationLabel = 'Current location';
  let usedFallback = false;
  try {
    const pos = await getCurrentPosition();
    latitude = pos.coords.latitude;
    longitude = pos.coords.longitude;
    updateLocationLabel(latitude, longitude);
  } catch {
    overview.locationLabel = 'Brisbane, QLD (location unavailable)';
    usedFallback = true;
  }

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation_probability,wind_speed_10m,weather_code,uv_index,is_day`
      + `&hourly=temperature_2m,precipitation_probability,weather_code`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max,sunrise,sunset`
      + `&timezone=auto&forecast_days=7`;
    const res = await fetchWithTimeout(url);
    if (!res.ok) throw new Error(`weather request failed: ${res.status}`);
    const data = await res.json();
    const cur = data.current;
    const daily = data.daily;
    const [label, icon] = describeWeather(cur.weather_code);

    applyTheme(cur.is_day);

    overview.weather = {
      label,
      icon,
      temp: Math.round(cur.temperature_2m),
      precip: Math.round(cur.precipitation_probability ?? 0),
      fallback: usedFallback,
      nudges: weatherNudges(cur, data.hourly, daily),
    };
    overview.weatherRaw = { current: cur, hourly: data.hourly, daily };
    overview.weatherReached = true;
    renderOverview();
    renderHome();
    fetchBrief();
    if (currentDetail === 'weather') openDetail('weather');
  } catch (err) {
    overview.weatherReached = false;
    renderHome();
    if (currentDetail === 'weather') openDetail('weather');
  }
}

// Recolors the ambient background by time of day. Uses the API's is_day when
// available, otherwise the device clock.
function applyTheme(isDay) {
  const hour = new Date().getHours();
  let period;
  if (isDay === 0) period = hour < 5 || hour >= 20 ? 'night' : 'dusk';
  else if (hour >= 5 && hour < 8) period = 'dawn';
  else if (hour >= 8 && hour < 17) period = 'day';
  else if (hour >= 17 && hour < 20) period = 'dusk';
  else period = 'night';
  document.body.classList.remove('theme-dawn', 'theme-day', 'theme-dusk', 'theme-night');
  document.body.classList.add('theme-' + period);
}

// Builds actionable {icon,text} weather lines from current/hourly/daily data.
function weatherNudges(cur, hourly, daily) {
  const out = [];
  // Umbrella — scan the next 12 hours for a rain-probability peak.
  if (hourly && hourly.time) {
    const now = Date.now();
    let peak = { p: -1, time: null };
    let count = 0;
    for (let i = 0; i < hourly.time.length && count < 12; i++) {
      const t = new Date(hourly.time[i]).getTime();
      if (t < now - 3600000) continue;
      count++;
      const p = hourly.precipitation_probability[i] ?? 0;
      if (p > peak.p) peak = { p, time: hourly.time[i] };
    }
    if (peak.p >= 50) {
      out.push({ icon: '☔', text: `Umbrella — ${Math.round(peak.p)}% rain around ${fmtClock(peak.time)}.` });
    }
  }
  // UV — high index today.
  if (daily && daily.uv_index_max) {
    const uv = Math.round(daily.uv_index_max[0] ?? 0);
    if (uv >= 6) out.push({ icon: '🧴', text: `High UV (${uv}) today — wear sunscreen.` });
  }
  // Temperature extremes today.
  if (daily && daily.temperature_2m_min) {
    const lo = Math.round(daily.temperature_2m_min[0]);
    const hi = Math.round(daily.temperature_2m_max[0]);
    if (lo <= 10) out.push({ icon: '🧥', text: `Chilly start at ${lo}° — take a layer.` });
    if (hi >= 32) out.push({ icon: '🥵', text: `Hot day, up to ${hi}° — stay hydrated.` });
  }
  return out;
}

// Next ~18 hours, horizontally scrollable. Returns HTML for the weather section.
function hourlyHtml(hourly) {
  if (!hourly || !hourly.time || !hourly.time.length) {
    return `<div class="empty-state">Hourly forecast unavailable.</div>`;
  }
  const now = Date.now();
  let start = hourly.time.findIndex((t) => new Date(t).getTime() >= now - 3600000);
  if (start < 0) start = 0;
  const cells = [];
  for (let i = start; i < hourly.time.length && cells.length < 18; i++) {
    const d = new Date(hourly.time[i]);
    const isNow = cells.length === 0;
    const label = isNow ? 'Now' : d.toLocaleTimeString(undefined, { hour: 'numeric' });
    const [, icon] = describeWeather(hourly.weather_code[i]);
    const temp = Math.round(hourly.temperature_2m[i]);
    const rain = Math.round(hourly.precipitation_probability[i] ?? 0);
    cells.push(`
      <div class="hour-cell">
        <span class="hc-time">${escapeHtml(label)}</span>
        <span class="hc-icon">${icon}</span>
        <span class="hc-temp">${temp}°</span>
        <span class="hc-rain">${rain >= 10 ? '💧' + rain + '%' : ''}</span>
      </div>`);
  }
  return `<div class="hourly-strip">${cells.join('')}</div>`;
}

// Map a temperature to a color on a cold→hot scale (blue → red).
function tempColor(t) {
  const hue = Math.max(0, Math.min(210, 210 - (t / 40) * 210));
  return `hsl(${hue}, 80%, 58%)`;
}

function forecastHtml(daily) {
  if (!daily || !daily.time || !daily.time.length) {
    return `<div class="empty-state">Forecast unavailable.</div>`;
  }
  const highs = daily.temperature_2m_max;
  const lows = daily.temperature_2m_min;
  const weekMax = Math.max(...highs);
  const weekMin = Math.min(...lows);
  const span = weekMax - weekMin || 1;

  const rows = daily.time.map((iso, i) => {
    const d = new Date(iso + 'T00:00');
    const dayLabel = i === 0 ? 'Today' : d.toLocaleDateString(undefined, { weekday: 'short' });
    const [, icon] = describeWeather(daily.weather_code[i]);
    const rain = Math.round(daily.precipitation_probability_max[i] ?? 0);
    const lo = Math.round(lows[i]);
    const hi = Math.round(highs[i]);

    const left = ((lows[i] - weekMin) / span) * 100;
    const width = Math.max(6, ((highs[i] - lows[i]) / span) * 100);
    const fill = `left:${left}%;width:${width}%;background:linear-gradient(90deg, ${tempColor(lows[i])}, ${tempColor(highs[i])});`;

    return `
      <div class="forecast-row">
        <span class="fc-day">${dayLabel}</span>
        <span class="fc-icon">${icon}</span>
        <span class="fc-rain ${rain > 0 ? '' : 'dry'}">${rain > 0 ? '💧' + rain + '%' : '—'}</span>
        <span class="fc-temps">
          <span class="fc-lo">${lo}°</span>
          <span class="fc-track"><span class="fc-fill" style="${fill}"></span></span>
          <span class="fc-hi">${hi}°</span>
        </span>
      </div>`;
  });

  return rows.join('');
}

// ---------- Email (Outlook-style) ----------
function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// "TikTok" <no-reply@tiktok.com>  ->  TikTok   |   bob@x.com -> bob
function senderName(from) {
  if (!from) return 'Unknown';
  const m = from.match(/^\s*"?([^"<]*?)"?\s*<.*>\s*$/);
  let name = m && m[1] ? m[1].trim() : '';
  if (!name) {
    const emailMatch = from.match(/[\w.+-]+@[\w.-]+/);
    name = emailMatch ? emailMatch[0].split('@')[0] : from.trim();
  }
  return name || 'Unknown';
}

const AVATAR_COLORS = ['#3a8dff', '#7c5cff', '#e0457b', '#1aa179', '#d98300', '#0a8fa6', '#b5468a', '#5a7d2a'];
function avatarColor(key) {
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

// Outlook-style relative date: today -> time, this week -> weekday, else -> date.
function fmtMailDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  const days = Math.floor((now - d) / 86400000);
  if (days >= 0 && days < 7) return d.toLocaleDateString(undefined, { weekday: 'long' });
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

// Deep link straight to the exact message, by its source. Gmail messages open
// in Gmail (app or web) by their API id; Outlook messages open in OWA. The
// Outlook iOS app can't be pointed at a specific Gmail message, so opening the
// precise email means opening it via its own provider.
function mailUrl(m) {
  if (m.source === 'Outlook' && m.id) {
    return `https://outlook.office.com/mail/inbox/id/${encodeURIComponent(m.id)}`;
  }
  if (m.id) {
    return `https://mail.google.com/mail/u/0/#all/${encodeURIComponent(m.id)}`;
  }
  return 'ms-outlook://';
}

function mailRow(m) {
  const name = senderName(m.from);
  const initial = escapeHtml(name.charAt(0).toUpperCase() || '?');
  const color = avatarColor(name + (m.source || ''));
  return `
    <a class="mail-row" href="${escapeHtml(mailUrl(m))}" target="_blank" rel="noopener">
      <span class="mail-unread-dot"></span>
      <span class="mail-avatar" style="background:${color}">${initial}</span>
      <span class="mail-body">
        <span class="mail-top">
          <span class="mail-sender">${escapeHtml(name)}</span>
          <span class="mail-date">${escapeHtml(fmtMailDate(m.date))}</span>
        </span>
        <span class="mail-subject">${escapeHtml(m.subject)}</span>
        <span class="mail-snippet">${escapeHtml(m.snippet)}</span>
      </span>
    </a>`;
}

// Mail list HTML for a section (returns a string, no DOM write).
function mailListHtml(items, emptyMsg) {
  if (!items.length) return `<div class="empty-state">${emptyMsg}</div>`;
  return `<div class="mail-scroll">${items.map(mailRow).join('')}</div>`;
}

async function loadEmail() {
  try {
    const res = await fetchWithTimeout(apiUrl('/api/email'));
    if (!res.ok) throw new Error(`status ${res.status}`);
    const data = await res.json();
    overview.emailReached = true;
    overview.emailConfigured = !!data.configured;
    overview.emailError = data.error || null;
    overview.email = { urgent: data.configured ? data.urgent.length : 0 };
    overview.emailData = data.configured ? { urgent: data.urgent, recent: data.recent } : { urgent: [], recent: [] };
    renderOverview();
    renderHome();
    if (currentDetail === 'inbox') openDetail('inbox');
    return true;
  } catch (err) {
    overview.emailReached = false;
    renderHome();

    return false;
  }
}

// ---- Today detail: in-depth day plan ----
function allFreeBlocks(events) {
  const now = new Date();
  const dayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 22, 0, 0);
  const busy = events
    .filter((ev) => ev.start && !ev.allDay && isToday(ev.start))
    .map((ev) => ({ start: new Date(ev.start), end: ev.end ? new Date(ev.end) : new Date(new Date(ev.start).getTime() + 30 * 60000) }))
    .filter((ev) => ev.end > now)
    .sort((a, b) => a.start - b.start);
  const blocks = [];
  let cursor = now;
  for (const ev of busy) {
    if (ev.start > cursor) blocks.push({ start: cursor, end: ev.start, ms: ev.start - cursor });
    if (ev.end > cursor) cursor = ev.end;
  }
  if (cursor < dayEnd) blocks.push({ start: cursor, end: dayEnd, ms: dayEnd - cursor });
  return blocks.filter((b) => b.ms >= 15 * 60000);
}

function todayDetailHtml() {
  if (overview.calendarReached === false && overview.remindersReached === false) {
    return `<section class="glass insight-card"><div class="error-state">Couldn't reach the service. Pull down to retry.</div></section>`;
  }
  const events = (overview.calendar || []).filter((ev) => ev.start && isToday(ev.start)).sort((a, b) => new Date(a.start) - new Date(b.start));
  const reminders = (overview.reminders || []).filter((r) => !r.start || isToday(r.start));
  const timed = events.filter((ev) => !ev.allDay);
  const free = allFreeBlocks(overview.calendar || []);
  const biggest = free.reduce((a, b) => (!a || b.ms > a.ms ? b : a), null);
  const now = new Date();

  // Recommended plan
  const plan = [];
  if (!events.length && !reminders.length) {
    plan.push({ ico: '🌤️', text: 'Clear day — nothing scheduled. A good chance to get ahead or genuinely rest.' });
  }
  if (timed.length) {
    const next = timed.find((ev) => new Date(ev.end || ev.start) > now);
    if (next) {
      const mins = Math.round((new Date(next.start) - now) / 60000);
      plan.push({ ico: '⏭️', text: `Next up: <b>${escapeHtml(next.summary)}</b> at ${fmtClock(next.start)}${mins > 0 && mins < 180 ? ` (in ${fmtDuration(mins * 60000)})` : ''}.` });
    }
  }
  if (biggest) {
    plan.push({ ico: '🎯', text: `Your best free block is <b>${fmtClock(biggest.start)}–${fmtClock(biggest.end)}</b> (${fmtDuration(biggest.ms)}). ${reminders.length ? 'Good window to clear your reminders or do focused work.' : 'Good window for focused work.'}` });
  }
  if (reminders.length) {
    const dueTimed = reminders.filter((r) => r.start && !r.allDay).sort((a, b) => new Date(a.start) - new Date(b.start));
    if (dueTimed.length) plan.push({ ico: '✅', text: `Earliest reminder due: <b>${escapeHtml(dueTimed[0].summary)}</b> at ${fmtClock(dueTimed[0].start)} — do it before then.` });
    else plan.push({ ico: '✅', text: `${reminders.length} reminder${reminders.length > 1 ? 's' : ''} with no set time — slot ${reminders.length > 1 ? 'them' : 'it'} into a free block.` });
  }
  // Tight turnarounds
  for (let i = 1; i < timed.length; i++) {
    const gap = (new Date(timed[i].start) - new Date(timed[i - 1].end || timed[i - 1].start)) / 60000;
    if (gap >= 0 && gap < 15) {
      plan.push({ ico: '⚠️', text: `Tight gap (${Math.round(gap)} min) between <b>${escapeHtml(timed[i - 1].summary)}</b> and <b>${escapeHtml(timed[i].summary)}</b>.` });
      break;
    }
  }

  const freeBars = free.length
    ? `<section class="glass insight-card"><div class="insight-head">Free blocks today</div><div class="bars">${
        free.map((b) => barRow(`${fmtClock(b.start)}`, b.ms, Math.max(...free.map((x) => x.ms)), fmtDuration(b.ms), '#46d39a')).join('')
      }</div></section>`
    : '';

  const totalFree = free.reduce((s, b) => s + b.ms, 0);

  return `
    <section class="glass detail-hero">
      <div class="metric-big">${events.length}<span style="font-size:1.2rem;font-weight:600;color:var(--muted)"> event${events.length === 1 ? '' : 's'}</span></div>
      <div class="metric-sub">${reminders.length} reminder${reminders.length === 1 ? '' : 's'} · ${fmtDuration(totalFree)} free time left today</div>
    </section>
    <section class="glass insight-card">
      <div class="insight-head">How to plan your day</div>
      ${insightLines(plan)}
    </section>
    ${freeBars}`;
}

function openDetail(type) {
  const d = DETAILS[type];
  if (!d) return;
  const wasOpen = currentDetail !== null;
  currentDetail = type;
  document.getElementById('detailTitle').textContent = d.title;
  document.getElementById('detailContent').innerHTML = d.build();
  const ov = document.getElementById('detailOverlay');
  ov.hidden = false;
  ov.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  // Push a history entry the first time we open, so the OS back gesture closes it.
  if (!wasOpen) history.pushState({ detail: type }, '');
}
function closeDetail() {
  if (currentDetail === null) return;
  currentDetail = null;
  document.getElementById('detailOverlay').hidden = true;
  document.body.style.overflow = '';
}
// The back button and OS back both route through history so state stays balanced.
window.addEventListener('popstate', () => { if (currentDetail !== null) closeDetail(); });

// Re-renders whichever section is open (after a task/brief/review mutation).
function refreshOpenSection() { if (currentDetail !== null) openDetail(currentDetail); }

// Interactions inside the detail sections (tasks, brief, review).
document.addEventListener('click', (e) => {
  const taskBtn = e.target.closest('[data-task-action]');
  if (taskBtn) {
    const id = taskBtn.getAttribute('data-task-id');
    const action = taskBtn.getAttribute('data-task-action');
    if (action === 'toggle') toggleTask(id);
    else if (action === 'snooze') snoozeTask(id);
    else if (action === 'delete') deleteTask(id);
    // Re-render just the checklist (keeps the type-ahead input intact) when in
    // the Tasks section; full re-render elsewhere.
    const listEl = document.getElementById('appTaskList');
    if (listEl) listEl.innerHTML = appTaskListInnerHtml();
    else refreshOpenSection();
    renderHome();
    return;
  }
  if (e.target.closest('[data-task-add-inline]')) { commitTaskInput(); return; }
  if (e.target.closest('[data-brief-refresh]')) { fetchBrief(true); return; }
  if (e.target.closest('[data-enable-push]')) { enablePush(); return; }
  if (e.target.closest('[data-review-rollover]')) {
    const today = localDateStr(new Date());
    loadTasks().filter((t) => !t.done && (!t.due || t.due <= today)).forEach((t) => snoozeTask(t.id));
    refreshOpenSection(); renderHome();
    return;
  }
  if (e.target.closest('[data-review-finish]')) {
    const noteEl = document.getElementById('reviewNote');
    finishReview(noteEl ? noteEl.value : '');
    renderStreak();
    refreshOpenSection();
    return;
  }
});

function setTileText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

function renderHome() {
  // Weather tile
  const w = overview.weather;
  setTileText('tileWeatherIcon', w ? w.icon : (overview.weatherReached === false ? '⚠️' : '⏳'));
  setTileText('tileWeatherValue', w ? `${w.temp}°` : '--°');
  setTileText('tileWeatherSub', w ? `${w.label} · ${w.precip}% rain` : (overview.weatherReached === false ? 'Tap to retry' : 'Loading…'));

  // Schedule tile — next event
  if (overview.calendarReached === undefined) { setTileText('tileSchedValue', '—'); setTileText('tileSchedSub', 'Loading…'); }
  else if (overview.calendarReached === false) { setTileText('tileSchedValue', '—'); setTileText('tileSchedSub', 'Tap to retry'); }
  else {
    const evs = todaysEvents();
    const now = new Date();
    const next = evs.find((ev) => ev.allDay || new Date(ev.end || ev.start) > now);
    if (!evs.length) { setTileText('tileSchedValue', 'Clear'); setTileText('tileSchedSub', 'No events today'); }
    else if (!next) { setTileText('tileSchedValue', 'Done'); setTileText('tileSchedSub', `${evs.length} event${evs.length > 1 ? 's' : ''}, all done`); }
    else { setTileText('tileSchedValue', next.allDay ? 'All day' : fmtClock(next.start)); setTileText('tileSchedSub', next.summary); }
  }

  // Tasks tile — app tasks + imported reminders due today
  const appOpen = appTasksForToday().length;
  const remOpen = (overview.remindersReached && overview.remindersConfigured !== false) ? todaysReminders().length : 0;
  const taskTotal = appOpen + remOpen;
  setTileText('tileTasksValue', String(taskTotal));
  setTileText('tileTasksSub', taskTotal ? `${appOpen} task${appOpen === 1 ? '' : 's'} · ${remOpen} reminder${remOpen === 1 ? '' : 's'}` : 'all clear ✨');

  // Inbox tile — unread + urgent
  if (overview.emailReached === undefined) { setTileText('tileInboxValue', '—'); setTileText('tileInboxSub', 'Loading…'); }
  else if (overview.emailReached === false) { setTileText('tileInboxValue', '—'); setTileText('tileInboxSub', 'Tap to retry'); }
  else if (overview.emailConfigured === false) { setTileText('tileInboxValue', '—'); setTileText('tileInboxSub', 'Not set up'); }
  else { const d = overview.emailData || { urgent: [], recent: [] }; setTileText('tileInboxValue', String(d.recent.length)); setTileText('tileInboxSub', `${d.urgent.length} urgent`); }

  renderStreak();
}

function renderStreak() {
  const el = document.getElementById('streakLabel');
  if (!el) return;
  const n = currentStreak();
  el.textContent = n > 0 ? `🔥 ${n}-day streak` : '';
  el.style.display = n > 0 ? '' : 'none';
}

// ---------- Readiness rings (Apple Watch / Bevel via the iOS Shortcut) ----------
const HEALTH_CACHE_KEY = 'morningDewHealth';
const RING_R = 82;
const RING_C = 2 * Math.PI * RING_R; // ~515.2

// One progress ring. pct 0–100; grad is a <linearGradient> id. Starts at 12
// o'clock and sweeps clockwise, matching the Bevel widget.
function ringSvg(pct, grad) {
  const p = Math.max(0, Math.min(100, Number(pct) || 0));
  const arc = (p / 100) * RING_C;
  return `<svg viewBox="0 0 200 200">
    <circle class="rtrack" cx="100" cy="100" r="${RING_R}"/>
    <circle cx="100" cy="100" r="${RING_R}" fill="none" stroke="url(#${grad})" stroke-width="16" stroke-linecap="round"
      stroke-dasharray="${arc.toFixed(1)} ${RING_C.toFixed(1)}" transform="rotate(-90 100 100)"/>
  </svg>`;
}

function ringBlock(pct, label, grad) {
  const has = pct !== null && pct !== undefined;
  return `<div class="hring">
    <div class="hring-wrap">${ringSvg(has ? pct : 0, grad)}<span class="hring-val">${has ? pct + '%' : '–'}</span></div>
    <span class="hring-label">${label}</span>
  </div>`;
}

async function fetchHealth() {
  try {
    const res = await fetchWithTimeout(apiUrl('/api/health'));
    const data = await res.json();
    overview.healthConfigured = data.configured;
    if (data.data) { overview.health = data.data; lsSet(HEALTH_CACHE_KEY, data.data); }
    else if (overview.health === undefined) overview.health = lsGet(HEALTH_CACHE_KEY, null);
  } catch {
    if (overview.health === undefined) overview.health = lsGet(HEALTH_CACHE_KEY, null);
  }
  renderHealth();
  if (currentDetail === 'health') openDetail('health');
}

function renderHealth() {
  const el = document.getElementById('healthRings');
  const meta = document.getElementById('healthMeta');
  if (!el) return;
  const h = overview.health;
  if (!h || (h.strain == null && h.recovery == null && h.sleep == null)) {
    el.innerHTML = `<div class="health-empty">Connect your Apple Watch — set up the <b>Morning Dew</b> Shortcut to see today's strain, recovery and sleep here.</div>`;
    if (meta) meta.textContent = 'Not connected';
    return;
  }
  el.innerHTML = ringBlock(h.strain, 'Strain', 'gStrain')
    + ringBlock(h.recovery, 'Recovery', 'gRecovery')
    + ringBlock(h.sleep, 'Sleep', 'gSleep');
  if (meta) meta.textContent = h.source || 'Apple Watch';
}

function healthDetailHtml() {
  const h = overview.health;
  if (!h || (h.strain == null && h.recovery == null && h.sleep == null)) {
    return `<div class="health-foot-note">No readiness data yet.<br><br>
      Set up the one-time <b>Morning Dew</b> iOS Shortcut to push your Apple Watch / Bevel
      numbers (strain, recovery, sleep) here each morning. Until then this section stays empty.</div>`;
  }
  const rings = ringBlock(h.strain, 'Strain', 'gStrain')
    + ringBlock(h.recovery, 'Recovery', 'gRecovery')
    + ringBlock(h.sleep, 'Sleep', 'gSleep');
  const bits = [];
  if (h.sleepHours != null) bits.push(`${h.sleepHours}h of sleep`);
  if (h.source) bits.push(`from ${escapeHtml(h.source)}`);
  if (h.updatedAt) bits.push(`updated ${fmtAgo(new Date(h.updatedAt).getTime())}`);
  return `<div class="health-detail-rings">${rings}</div>
    <div class="health-foot-note">${bits.join(' · ') || 'Today\'s readiness from your Apple Watch.'}</div>`;
}

// ---------- Refresh orchestration ----------
let lastUpdated = 0;

// Runs an /api loader and, if it failed (couldn't reach the backend — likely a
// Render cold start), retries once after a delay long enough to cover the wake.
function withColdStartRetry(loadFn, delayMs = 10000) {
  Promise.resolve(loadFn()).then((ok) => {
    if (ok === false) setTimeout(loadFn, delayMs);
  });
}

function fmtAgo(ts) {
  if (!ts) return '';
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 45) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  return `${h}h ago`;
}

function renderUpdated() {
  const el = document.getElementById('updatedLabel');
  if (!el) return;
  el.textContent = lastUpdated ? `Updated ${fmtAgo(lastUpdated)}` : 'Updating…';
}

function refreshAll() {
  lastUpdated = Date.now();
  renderUpdated();
  // Wake the backend a beat early so the /api calls land on a warm container.
  fetchWithTimeout(apiUrl('/')).catch(() => {});
  loadWeather();
  withColdStartRetry(loadCalendar);
  withColdStartRetry(loadReminders);
  withColdStartRetry(loadEmail);
  fetchHealth();
}

// ---------- Controls ----------
function openServerSetting() {
  const current = getApiBase();
  const next = prompt('Backend URL (e.g. https://morning-dew-backend.onrender.com)\nLeave blank to use this same site.', current);
  if (next === null) return;
  const trimmed = next.trim();
  if (trimmed) localStorage.setItem(API_BASE_KEY, trimmed);
  else localStorage.removeItem(API_BASE_KEY);
  updateServerBtnLabel();
  refreshAll();
}

document.getElementById('settingsBtn').addEventListener('click', openServerSetting);

// ---------- Detail-screen wiring ----------
document.addEventListener('click', (e) => {
  const trigger = e.target.closest('[data-detail]');
  if (trigger) {
    e.preventDefault();
    openDetail(trigger.getAttribute('data-detail'));
  }
});
// Route the back button and Escape through history so the pushed state is
// consumed (keeps the OS back gesture in sync via the popstate listener).
document.getElementById('detailBack').addEventListener('click', () => { if (currentDetail !== null) history.back(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape' && currentDetail !== null) history.back(); });
// Pressing Return in the checklist input adds the reminder and keeps you typing.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.target && e.target.id === 'taskInput') { e.preventDefault(); commitTaskInput(); }
});

document.getElementById('pageRefreshBtn').addEventListener('click', (e) => {
  e.currentTarget.classList.remove('spinning');
  // reflow so the animation restarts on every tap
  void e.currentTarget.offsetWidth;
  e.currentTarget.classList.add('spinning');
  refreshAll();
});

// ---------- Pull to refresh ----------
(function setupPullToRefresh() {
  const spinner = document.getElementById('ptrSpinner');
  const THRESHOLD = 70;
  let startY = 0;
  let pulling = false;
  window.addEventListener('touchstart', (e) => {
    if (!currentDetail && window.scrollY <= 0 && e.touches.length === 1) {
      startY = e.touches[0].clientY;
      pulling = true;
    } else {
      pulling = false;
    }
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0 && window.scrollY <= 0) {
      const pct = Math.min(1, dy / THRESHOLD);
      spinner.style.opacity = String(pct);
      spinner.style.transform = `translate(-50%, ${Math.min(dy / 2, 40) - 10}px)`;
    }
  }, { passive: true });
  window.addEventListener('touchend', (e) => {
    if (!pulling) return;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > THRESHOLD && window.scrollY <= 0) {
      spinner.classList.add('active');
      spinner.style.opacity = '1';
      refreshAll();
      setTimeout(() => {
        spinner.classList.remove('active');
        spinner.style.opacity = '0';
        spinner.style.transform = 'translate(-50%, -10px)';
      }, 1200);
    } else {
      spinner.style.opacity = '0';
      spinner.style.transform = 'translate(-50%, -10px)';
    }
    pulling = false;
  }, { passive: true });
})();

// ---------- Refresh on open / focus ----------
// Re-fetch when the installed PWA is brought back to the foreground after being
// idle, so it's fresh the moment it's opened each morning without a manual tap.
const STALE_MS = 5 * 60 * 1000;
function maybeRefreshOnVisible() {
  if (document.visibilityState === 'visible' && Date.now() - lastUpdated > STALE_MS) {
    refreshAll();
  }
}
document.addEventListener('visibilitychange', maybeRefreshOnVisible);
window.addEventListener('pageshow', maybeRefreshOnVisible);

// ---------- Boot ----------
renderGreeting();
applyTheme(); // hour-based theme immediately; weather refines it with is_day
// Seed a cached brief (if today's is stored) so the hero card is instant.
const seededBrief = cachedBrief();
if (seededBrief) overview.brief = seededBrief;
renderStreak();
renderOverview();
refreshAll();
setInterval(renderUpdated, 30000);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
