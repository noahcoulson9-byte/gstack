<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Weather</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#3a8dff" />

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Weather" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<style>
  :root {
    --text: #f5f7fb;
    --muted: rgba(245, 247, 251, 0.62);
    --glass-bg: rgba(255, 255, 255, 0.10);
    --glass-bg-soft: rgba(255, 255, 255, 0.07);
    --glass-border: rgba(255, 255, 255, 0.28);
    --glass-highlight: rgba(255, 255, 255, 0.45);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overflow-x: hidden;
  }
  body {
    position: relative;
    background: #060912;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: calc(env(safe-area-inset-top) + 1.5rem) 1.1rem calc(env(safe-area-inset-bottom) + 1.5rem);
    gap: 1.5rem;
  }

  /* ---------- Liquid background: drifting blurred color blobs ---------- */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
    z-index: 0;
    will-change: transform;
  }
  .blob-a {
    width: 60vw; height: 60vw;
    top: -15vw; left: -20vw;
    background: radial-gradient(circle, #3a8dff, transparent 70%);
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .blob-b {
    width: 70vw; height: 70vw;
    bottom: -25vw; right: -25vw;
    background: radial-gradient(circle, #7c5cff, transparent 70%);
    animation: drift2 26s ease-in-out infinite alternate;
  }
  .blob-c {
    width: 50vw; height: 50vw;
    top: 30vh; right: -15vw;
    background: radial-gradient(circle, #34e0c4, transparent 70%);
    opacity: 0.35;
    animation: drift3 30s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(6vw, 8vh); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-8vw, -6vh); } }
  @keyframes drift3 { from { transform: translate(0,0); } to { transform: translate(-5vw, 5vh); } }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 430px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ---------- Greeting ---------- */
  .greeting-block { padding: 0 0.25rem; }
  .greeting-date {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .greeting-phrase {
    font-size: 1.75rem;
    font-weight: 600;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .greeting-name {
    font-size: 2.75rem;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.01em;
    background: linear-gradient(120deg, #ffffff, #cfe0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* ---------- Liquid Glass surfaces ---------- */
  .glass {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.25);
    overflow: hidden;
  }
  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--glass-highlight), transparent 45%);
    opacity: 0.25;
    pointer-events: none;
  }

  .weather-card { padding: 1.75rem 1.5rem; text-align: center; }
  .weather-icon { font-size: 4.2rem; line-height: 1; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35)); }
  .temp {
    font-size: 4.5rem;
    font-weight: 700;
    margin: 0.1rem 0;
    letter-spacing: -0.02em;
  }
  .desc { font-size: 1.15rem; font-weight: 600; }
  .location { color: var(--muted); font-size: 0.95rem; margin-top: 0.2rem; }

  .stats-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .stat-card {
    padding: 1rem;
    text-align: left;
  }
  .stat-label {
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 0.2rem;
  }

  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
  }
  .refresh-btn {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 0.95rem;
    font-size: 0.98rem;
    font-weight: 600;
    color: var(--text);
    border-radius: 22px;
    background: var(--glass-bg-soft);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .refresh-btn:active {
    transform: scale(0.97);
    background: rgba(255, 255, 255, 0.16);
  }

  .source {
    position: relative;
    z-index: 1;
    color: var(--muted);
    font-size: 0.72rem;
    text-align: center;
    padding: 0 0.5rem;
  }

  footer {
    position: relative;
    z-index: 1;
    margin-top: auto;
    color: var(--muted);
    font-size: 0.72rem;
    text-align: center;
  }
</style>
</head>
<body>

<div class="blob blob-a"></div>
<div class="blob blob-b"></div>
<div class="blob blob-c"></div>

<main>
  <div class="greeting-block">
    <div class="greeting-date" id="dateLabel"></div>
    <div class="greeting-phrase" id="greetingPhrase">Good day</div>
    <div class="greeting-name">Noah</div>
  </div>

  <section class="glass weather-card" id="weatherCard">
    <div class="weather-icon" id="weatherIcon">⏳</div>
    <div class="temp" id="temp">--°</div>
    <div class="desc" id="desc">Loading weather...</div>
    <div class="location" id="location"></div>
  </section>

  <section class="stats-grid">
    <div class="glass stat-card">
      <div class="stat-label">Feels like</div>
      <div class="stat-value" id="feelsLike">--°</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-label">Humidity</div>
      <div class="stat-value" id="humidity">--%</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-label">Wind</div>
      <div class="stat-value" id="wind">-- km/h</div>
    </div>
    <div class="glass stat-card">
      <div class="stat-label">Precipitation</div>
      <div class="stat-value" id="precip">--%</div>
    </div>
  </section>

  <button class="refresh-btn" id="refreshBtn">Refresh</button>

  <div class="source">Source: Open-Meteo — auto-selects the highest-resolution national weather model for your location (e.g. ECMWF/ICON/GFS)</div>
</main>

<footer>Add to Home Screen for the full app experience.</footer>

<script>
const WEATHER_CODES = {
  0: ['Clear sky', '☀️'],
  1: ['Mainly clear', '🌤️'],
  2: ['Partly cloudy', '⛅'],
  3: ['Overcast', '☁️'],
  45: ['Fog', '🌫️'],
  48: ['Freezing fog', '🌫️'],
  51: ['Light drizzle', '🌦️'],
  53: ['Drizzle', '🌦️'],
  55: ['Heavy drizzle', '🌧️'],
  56: ['Freezing drizzle', '🌧️'],
  57: ['Freezing drizzle', '🌧️'],
  61: ['Light rain', '🌧️'],
  63: ['Rain', '🌧️'],
  65: ['Heavy rain', '🌧️'],
  66: ['Freezing rain', '🌧️'],
  67: ['Freezing rain', '🌧️'],
  71: ['Light snow', '🌨️'],
  73: ['Snow', '🌨️'],
  75: ['Heavy snow', '❄️'],
  77: ['Snow grains', '❄️'],
  80: ['Light showers', '🌦️'],
  81: ['Showers', '🌧️'],
  82: ['Heavy showers', '⛈️'],
  85: ['Snow showers', '🌨️'],
  86: ['Heavy snow showers', '❄️'],
  95: ['Thunderstorm', '⛈️'],
  96: ['Thunderstorm + hail', '⛈️'],
  99: ['Severe thunderstorm', '⛈️'],
};

function describeWeather(code) {
  return WEATHER_CODES[code] || ['Unknown', '❔'];
}

function renderGreeting() {
  const now = new Date();
  const hour = now.getHours();
  const phrase = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greetingPhrase').textContent = phrase;
  document.getElementById('dateLabel').textContent = now.toLocaleDateString(undefined, {
    weekday: 'long',
    month: 'long',
    day: 'numeric',
  });
}

async function loadWeather() {
  const descEl = document.getElementById('desc');
  const iconEl = document.getElementById('weatherIcon');
  descEl.textContent = 'Locating you...';
  iconEl.textContent = '⏳';

  if (!('geolocation' in navigator)) {
    descEl.textContent = 'Geolocation not supported on this device.';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude, longitude } = pos.coords;
      try {
        descEl.textContent = 'Fetching weather...';
        // No "models" param: Open-Meteo's default IS best_match (auto-picks the
        // highest-res national model per location). Passing it explicitly switches
        // the API into multi-model response mode and was producing drifted readings.
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation_probability,wind_speed_10m,weather_code`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('weather request failed');
        const data = await res.json();
        const cur = data.current;
        const [label, icon] = describeWeather(cur.weather_code);

        document.getElementById('temp').textContent = `${Math.round(cur.temperature_2m)}°`;
        document.getElementById('feelsLike').textContent = `${Math.round(cur.apparent_temperature)}°`;
        document.getElementById('humidity').textContent = `${Math.round(cur.relative_humidity_2m)}%`;
        document.getElementById('wind').textContent = `${Math.round(cur.wind_speed_10m)} km/h`;
        document.getElementById('precip').textContent = `${Math.round(cur.precipitation_probability ?? 0)}%`;
        descEl.textContent = label;
        iconEl.textContent = icon;

        try {
          const geoRes = await fetch(
            `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`
          );
          if (geoRes.ok) {
            const geo = await geoRes.json();
            const place = [geo.city || geo.locality, geo.principalSubdivisionCode || geo.countryCode]
              .filter(Boolean)
              .join(', ');
            document.getElementById('location').textContent = place;
          }
        } catch (_) {
          // location label is a nice-to-have; weather data above is unaffected
        }
      } catch (err) {
        descEl.textContent = 'Could not load weather. Tap Refresh to retry.';
        iconEl.textContent = '⚠️';
      }
    },
    (err) => {
      descEl.textContent = 'Location permission denied. Enable it in Settings to see local weather.';
      iconEl.textContent = '📍';
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 5 * 60 * 1000 }
  );
}

renderGreeting();
document.getElementById('refreshBtn').addEventListener('click', loadWeather);
loadWeather();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
