<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Weather</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2563eb" />

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Weather" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<style>
  :root {
    --bg: #0b1220;
    --card: #131c31;
    --accent: #2563eb;
    --text: #f3f5f9;
    --muted: #8b9bb4;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom);
    gap: 1.25rem;
    min-height: 100vh;
  }
  header {
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-top: 1.5rem;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    margin: 0;
    letter-spacing: 0.02em;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 20px;
    padding: 1.5rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  .weather-icon { font-size: 4rem; line-height: 1; }
  .temp { font-size: 4rem; font-weight: 700; margin: 0.2rem 0; }
  .location { color: var(--muted); font-size: 0.95rem; }
  .desc { font-size: 1.1rem; margin-top: 0.25rem; }
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-top: 1.25rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .meta-grid span b { color: var(--text); display: block; font-size: 1.1rem; margin-top: 0.15rem; }
  button {
    font-family: inherit;
    border: none;
    border-radius: 14px;
    cursor: pointer;
  }
  #refreshBtn {
    margin-top: 1.25rem;
    width: 100%;
    padding: 0.7rem;
    background: rgba(255,255,255,0.06);
    color: var(--text);
    font-size: 0.95rem;
  }
  .source {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 0.75rem;
  }
  footer {
    margin-top: auto;
    padding: 1rem 0 1.5rem;
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>WEATHER</h1>
</header>

<section class="card" id="weatherCard">
  <div class="weather-icon" id="weatherIcon">⏳</div>
  <div class="temp" id="temp">--°</div>
  <div class="desc" id="desc">Loading weather...</div>
  <div class="location" id="location"></div>
  <div class="meta-grid">
    <span>Feels like <b id="feelsLike">--°</b></span>
    <span>Humidity <b id="humidity">--%</b></span>
    <span>Wind <b id="wind">-- km/h</b></span>
    <span>Precipitation <b id="precip">--%</b></span>
  </div>
  <button id="refreshBtn">Refresh</button>
  <div class="source">Source: Open-Meteo (best_match — auto-selects the highest-resolution national weather model for your location, e.g. ECMWF/ICON/GFS)</div>
</section>

<footer>Add to Home Screen for the full app experience.</footer>

<script>
const WEATHER_CODES = {
  0: ['Clear sky', '☀️'],
  1: ['Mainly clear', '🌤️'],
  2: ['Partly cloudy', '⛅'],
  3: ['Overcast', '☁️'],
  45: ['Fog', '🌫️'],
  48: ['Freezing fog', '🌫️'],
  51: ['Light drizzle', '🌦️'],
  53: ['Drizzle', '🌦️'],
  55: ['Heavy drizzle', '🌧️'],
  56: ['Freezing drizzle', '🌧️'],
  57: ['Freezing drizzle', '🌧️'],
  61: ['Light rain', '🌧️'],
  63: ['Rain', '🌧️'],
  65: ['Heavy rain', '🌧️'],
  66: ['Freezing rain', '🌧️'],
  67: ['Freezing rain', '🌧️'],
  71: ['Light snow', '🌨️'],
  73: ['Snow', '🌨️'],
  75: ['Heavy snow', '❄️'],
  77: ['Snow grains', '❄️'],
  80: ['Light showers', '🌦️'],
  81: ['Showers', '🌧️'],
  82: ['Heavy showers', '⛈️'],
  85: ['Snow showers', '🌨️'],
  86: ['Heavy snow showers', '❄️'],
  95: ['Thunderstorm', '⛈️'],
  96: ['Thunderstorm + hail', '⛈️'],
  99: ['Severe thunderstorm', '⛈️'],
};

function describeWeather(code) {
  return WEATHER_CODES[code] || ['Unknown', '❔'];
}

async function loadWeather() {
  const descEl = document.getElementById('desc');
  const iconEl = document.getElementById('weatherIcon');
  descEl.textContent = 'Locating you...';
  iconEl.textContent = '⏳';

  if (!('geolocation' in navigator)) {
    descEl.textContent = 'Geolocation not supported on this device.';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude, longitude } = pos.coords;
      try {
        descEl.textContent = 'Fetching weather...';
        // models=best_match picks the highest-resolution national model (ECMWF/ICON/GFS/etc) per location.
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation_probability,wind_speed_10m,weather_code&models=best_match`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('weather request failed');
        const data = await res.json();
        const cur = data.current;
        const [label, icon] = describeWeather(cur.weather_code);

        document.getElementById('temp').textContent = `${Math.round(cur.temperature_2m)}°`;
        document.getElementById('feelsLike').textContent = `${Math.round(cur.apparent_temperature)}°`;
        document.getElementById('humidity').textContent = `${Math.round(cur.relative_humidity_2m)}%`;
        document.getElementById('wind').textContent = `${Math.round(cur.wind_speed_10m)} km/h`;
        document.getElementById('precip').textContent = `${Math.round(cur.precipitation_probability ?? 0)}%`;
        descEl.textContent = label;
        iconEl.textContent = icon;

        try {
          const geoRes = await fetch(
            `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`
          );
          if (geoRes.ok) {
            const geo = await geoRes.json();
            const place = [geo.city || geo.locality, geo.principalSubdivisionCode || geo.countryCode]
              .filter(Boolean)
              .join(', ');
            document.getElementById('location').textContent = place;
          }
        } catch (_) {
          // location label is a nice-to-have; weather data above is unaffected
        }
      } catch (err) {
        descEl.textContent = 'Could not load weather. Tap Refresh to retry.';
        iconEl.textContent = '⚠️';
      }
    },
    (err) => {
      descEl.textContent = 'Location permission denied. Enable it in Settings to see local weather.';
      iconEl.textContent = '📍';
    },
    { enableHighAccuracy: false, timeout: 10000, maximumAge: 5 * 60 * 1000 }
  );
}

document.getElementById('refreshBtn').addEventListener('click', loadWeather);
loadWeather();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
